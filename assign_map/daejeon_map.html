      const token = ++state.markerToken;
      if (state.markerRenderTimer) window.clearTimeout(state.markerRenderTimer);
      state.markerRenderTimer = window.setTimeout(() => window.requestAnimationFrame(() => {
        if (token !== state.markerToken) return;
        clearMarkers();
        if (!state.pointsVisible) return;
        const records = state.currentScope.records || [];
        const bounds = state.map.getBounds();
        const modulo = markerSampleModulo();
        const size = markerSize();
        const selectedZone = state.selectedZoneId ? state.assignmentZoneMap.get(state.selectedZoneId) : null;
        const selectedIds = selectedZone ? new Set(selectedZone.records.map((record) => record.id)) : null;
        const markerItems = [];
        records.forEach((record, index) => {
          const force = state.selectedRecordId
            ? record.id === state.selectedRecordId
            : (state.residualRecordIdSet.has(record.id) || selectedIds?.has(record.id));
          if (!force && index % modulo !== 0) return;
          if (!force && !recordInBounds(record, bounds)) return;
          markerItems.push({ record, force });
        });

        let cursor = 0;
        const batchSize = 220;
        const renderBatch = () => {
          if (token !== state.markerToken) return;
          const end = Math.min(cursor + batchSize, markerItems.length);
          for (; cursor < end; cursor += 1) {
            const { record, force } = markerItems[cursor];
            const color = getRecordColor(record);
            const marker = new naver.maps.Marker({
              position: new naver.maps.LatLng(record.lat, record.lon),
              map: state.map,
              icon: markerIcon(color, force ? size + 4 : size),
              zIndex: force ? 200 : 20
            });
            naver.maps.Event.addListener(marker, "click", () => selectRecord(record));
            state.markers.push(marker);
          }
          if (cursor < markerItems.length) window.requestAnimationFrame(renderBatch);
        };
        renderBatch();
      }), delay);
    }

    function clearSelectedOverlays() {
      for (const overlay of state.selectedOverlays) overlay.setMap(null);
      state.selectedOverlays = [];
      if (state.searchMarker) {
        state.searchMarker.setMap(null);
        state.searchMarker = null;
      }
    }

    function collectGeometryRings(value, rings = []) {
      if (!Array.isArray(value) || !value.length) return rings;
      if (
        Array.isArray(value[0]) &&
        value[0].length >= 2 &&
        typeof value[0][0] === "number" &&
        typeof value[0][1] === "number"
      ) {
        rings.push(value);
        return rings;
      }
      for (const item of value) collectGeometryRings(item, rings);
      return rings;
    }

    function drawZoneOverlays(zone) {
      clearSelectedOverlays();
    }

    function drawRecordOverlay(record) {
      clearSelectedOverlays();
      const color = getRecordColor(record);
      state.searchMarker = new naver.maps.Marker({
        position: new naver.maps.LatLng(record.lat, record.lon),
        map: state.map,
        icon: markerIcon(color, 22),
        zIndex: 400
      });
    }

    function fitRecords(records) {
      if (!state.map || !records?.length) return;
      const bounds = new naver.maps.LatLngBounds();
      for (const record of records) bounds.extend(new naver.maps.LatLng(record.lat, record.lon));
      state.map.fitBounds(bounds, { top: 52, right: 52, bottom: 52, left: 52 });
    }

    function fitScope(scope) {
      fitRecords(scope?.records || []);
    }

    function resetAssignment() {
      state.currentAssignments = [];
      state.zoneByRecordId = new Map();
      state.assignmentZoneMap = new Map();
      state.residualRecords = [];
      state.residualRecordIdSet = new Set();
      state.selectedRecordId = null;
      state.selectedZoneId = null;
      clearSelectedOverlays();
      updateBandSummary(null);
      renderAssignmentTable([]);
      updateRemainingButton();
      renderMarkers();
      setStatus("배정 결과를 초기화했습니다.");
    }

    function updateRemainingButton() {
      document.getElementById("remaining-btn").textContent = `잔여오더 ${formatNumber(getTotalOrders(state.residualRecords))}`;
    }

    function updateScope() {
      const scope = getScope();
      state.currentScope = scope;
      state.currentRecordMap = new Map((scope?.records || []).map((record) => [record.id, record]));
      resetAssignment();
      updateStats(scope);
      if (scope) {
        fitScope(scope);
        setStatus(`${scope.scope_key || getScopeKey()} 데이터 로드: ${formatNumber(scope.records?.length || 0)}주소 / ${formatNumber(scope.total_orders || getTotalOrders(scope.records || []))}건`);
      }
    }

    function searchRecord() {
      const scope = state.currentScope;
      const keyword = normalizeText(document.getElementById("search-input").value).toLowerCase();
      if (!scope || !keyword) {
        setStatus("검색어를 입력하세요.", true);
        return;
      }
      const record = (scope.records || []).find((item) => {
        const text = [
          item.id,
          item.address,
          item.road_address,
          item.jibun_address,
          item.dong,
          item.road_stem,
          item.block_id,
          item.lot_main,
          item.lot_sub
        ].map((value) => normalizeText(value).toLowerCase()).join(" ");
        return text.includes(keyword);
      });
      if (!record) {
        setStatus(`검색 결과가 없습니다: ${keyword}`, true);
        return;
      }
      selectRecord(record);
      setStatus(`검색 결과: ${record.address || record.road_address || record.jibun_address}`);
    }

    function exportAssignments() {
      const scope = state.currentScope;
      if (!scope) {
        setStatus("저장할 데이터가 없습니다.", true);
        return;
      }
      const exportBaseName = `${scope.center || "center"}_${scope.month || "month"}_인원배정`;
      const rows = [[
        "구분", "인원", "오더", "센터", "월", "주소", "도로명주소", "지번주소",
        "동", "도로명", "본번", "부번"
      ]];
      for (const zone of state.currentAssignments) {
        zone.records.forEach((record) => rows.push(recordExportRow("자동배정", zone.id, record)));
      }
      state.residualRecords.forEach((record) => rows.push(recordExportRow("잔여오더", "", record)));
      if (rows.length <= 1) {
        setStatus("먼저 배정을 실행하세요.", true);
        return;
      }
      fetch("./api/export_assignments_xlsx", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          filename: exportBaseName,
          sheet_name: "Assignments",
          rows
        })
      })
        .then((response) => {
          if (!response.ok) throw new Error(`저장 실패 (${response.status})`);
          return response.blob();
        })
        .then((blob) => {
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = `${exportBaseName}.xlsx`;
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          URL.revokeObjectURL(url);
          setStatus("엑셀 저장을 완료했습니다.");
        })
        .catch((error) => setStatus(`엑셀 저장 실패: ${error.message}`, true));
    }

    function recordExportRow(kind, person, record) {
      return [
        kind,
        person,
        record.orders ?? "",
        record.center ?? "",
        record.month ?? "",
        record.address ?? "",
        record.road_address ?? "",
        record.jibun_address ?? "",
        record.dong ?? "",
        record.road_stem ?? "",
        record.lot_main ?? "",
        record.lot_sub ?? ""
      ];
    }

    function showPanel() {
      document.getElementById("control-panel").classList.remove("hidden");
    }

    function showDetailPanel() {
      document.getElementById("detail-panel").classList.remove("hidden");
    }

    function hideDetailPanel() {
      document.getElementById("detail-panel").classList.add("hidden");
    }

    function clearSelection() {
      state.selectedRecordId = null;
      state.selectedZoneId = null;
      clearSelectedOverlays();
      renderAssignmentTable(state.currentAssignments);
      hideDetailPanel();
      renderMarkers();
    }

    function setupEvents() {
      document.getElementById("center-select").addEventListener("change", updateScope);
      document.getElementById("month-select").addEventListener("change", updateScope);
      document.getElementById("people-input").addEventListener("input", updateTargetOutput);
      document.getElementById("assign-btn").addEventListener("click", runAssignment);
      document.getElementById("clear-btn").addEventListener("click", resetAssignment);
      document.getElementById("remaining-btn").addEventListener("click", renderResidualDetail);
      document.getElementById("export-btn").addEventListener("click", exportAssignments);
      document.getElementById("search-btn").addEventListener("click", searchRecord);
      document.getElementById("search-input").addEventListener("keydown", (event) => {
        if (event.key === "Enter") searchRecord();
      });
      document.getElementById("fit-all-btn").addEventListener("click", () => fitScope(state.currentScope));
      document.getElementById("reset-map-btn").addEventListener("click", () => fitScope(state.currentScope));
      document.getElementById("toggle-points-btn").addEventListener("click", () => {
        state.pointsVisible = !state.pointsVisible;
        document.getElementById("toggle-points-btn").textContent = `점 표시 ${state.pointsVisible ? "ON" : "OFF"}`;
        renderMarkers();
      });
      document.getElementById("toggle-cadastral-btn").addEventListener("click", () => {
        state.cadastralVisible = !state.cadastralVisible;
        document.getElementById("toggle-cadastral-btn").textContent = `지적도 ${state.cadastralVisible ? "ON" : "OFF"}`;
        if (state.cadastralLayer) state.cadastralLayer.setMap(state.cadastralVisible ? state.map : null);
      });
      document.getElementById("toggle-panel-btn").addEventListener("click", () => {
        document.getElementById("control-panel").classList.add("hidden");
      });
      document.getElementById("toggle-detail-btn").addEventListener("click", () => {
        document.getElementById("detail-panel").classList.add("hidden");
      });
      document.getElementById("open-panel-btn").addEventListener("click", showPanel);
      document.getElementById("open-detail-btn").addEventListener("click", showDetailPanel);
      document.getElementById("zoom-in-btn").addEventListener("click", () => state.map?.setZoom(state.map.getZoom() + 1, false));
      document.getElementById("zoom-out-btn").addEventListener("click", () => state.map?.setZoom(state.map.getZoom() - 1, false));
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") clearSelection();
      });
      window.addEventListener("resize", () => {
        if (!state.map) return;
        state.map.setSize(new naver.maps.Size(window.innerWidth, window.innerHeight));
      });
    }

    async function init() {
      try {
        showLoading("지도 SDK와 processed_assignment_blocks.json을 로드하는 중입니다.");
        const [maps, appData] = await Promise.all([waitForNaverMaps(), loadAppData()]);
        state.appData = appData;
        state.map = new maps.Map("map", {
          center: new maps.LatLng(36.3504119, 127.3845475),
          zoom: 13,
          minZoom: 8,
          mapTypeControl: true,
          scaleControl: true
        });
        if (maps.CadastralLayer) {
          state.cadastralLayer = new maps.CadastralLayer();
          state.cadastralLayer.setMap(state.map);
        }
        maps.Event.addListener(state.map, "idle", renderMarkers);
        maps.Event.addListener(state.map, "click", () => {
          clearSelection();
        });
        populateFilters();
        setupEvents();
        updateScope();
        hideLoading();
      } catch (error) {
        console.error(error);
        hideLoading();
        setStatus(`초기화 실패: ${error.message}`, true);
      }
    }

    window.navermap_authFailure = function () {
      setStatus("네이버 지도 인증에 실패했습니다. API 키 설정을 확인하세요.", true);
    };

    init();
  </script>
</body>
</html>
