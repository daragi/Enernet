    function getNeighborBlockIds(block) {
      return (block?.neighbors || [])
        .map((item) => typeof item === "string" ? item : item.id)
        .filter(Boolean);
    }

    function getBlockDistance(blockA, blockB) {
      if (!blockA || !blockB) {
        return Infinity;
      }
      const edge = (blockA.neighbors || []).find((item) => (typeof item === "string" ? item : item.id) === blockB.id);
      if (edge && Number.isFinite(edge.distance_m)) {
        return edge.distance_m;
      }
      return haversineM(blockA.centroid[0], blockA.centroid[1], blockB.centroid[0], blockB.centroid[1]);
    }

    function buildRecordsByBlock(records) {
      const recordsByBlock = new Map();
      for (const record of records) {
        if (!recordsByBlock.has(record.block_id)) {
          recordsByBlock.set(record.block_id, []);
        }
        recordsByBlock.get(record.block_id).push(record);
      }
      for (const list of recordsByBlock.values()) {
        list.sort(compareSequentialRecords);
      }
      return recordsByBlock;
    }

    function allocateConnectedZoneCounts(components, zoneCount, globalTarget) {
      if (!components.length) {
        return [];
      }

      const allocations = components.map((component) => ({
        component,
        desired: component.orders / Math.max(1, globalTarget),
        count: 0
      }));

      if (zoneCount <= components.length) {
        allocations
          .sort((a, b) => b.component.orders - a.component.orders)
          .forEach((item, index) => {
            item.count = index < zoneCount ? 1 : 0;
          });
        return allocations;
      }

      for (const item of allocations) {
        item.count = Math.max(1, Math.min(item.component.blocks.length, Math.floor(item.desired)));
      }

      let assigned = allocations.reduce((sum, item) => sum + item.count, 0);

      while (assigned < zoneCount) {
        const candidate = allocations
          .filter((item) => item.count < item.component.blocks.length)
          .sort((a, b) => {
            const aNeed = (a.desired - a.count) + a.component.orders / Math.max(1, globalTarget * 4);
            const bNeed = (b.desired - b.count) + b.component.orders / Math.max(1, globalTarget * 4);
            return bNeed - aNeed || b.component.orders - a.component.orders;
          })[0];
        if (!candidate) {
          break;
        }
        candidate.count += 1;
        assigned += 1;
      }

      while (assigned > zoneCount) {
        const candidate = allocations
          .filter((item) => item.count > 1)
          .sort((a, b) => {
            const aSpare = (a.count - a.desired);
            const bSpare = (b.count - b.desired);
            return bSpare - aSpare || a.component.orders - b.component.orders;
          })[0];
        if (!candidate) {
          break;
        }
        candidate.count -= 1;
        assigned -= 1;
      }

      return allocations;
    }

    function partitionComponentsForZoneAllocation(components, globalTarget) {
      if (!components.length) {
        return { coreComponents: [], minorComponents: [] };
      }

      const coreComponents = [];
      const minorComponents = [];
      const minorThreshold = globalTarget * 0.6;

      for (const component of components) {
        if (component.orders < minorThreshold) {
          minorComponents.push(component);
        } else {
          coreComponents.push(component);
        }
      }

      if (!coreComponents.length) {
        return {
          coreComponents: components.slice(),
          minorComponents: []
        };
      }

      return { coreComponents, minorComponents };
    }

    function chooseConnectedSeeds(blocks, seedCount) {
      if (!blocks.length) {
        return [];
      }

      const totalOrders = blocks.reduce((sum, block) => sum + block.orders, 0) || 1;
      const centroidLat = blocks.reduce((sum, block) => sum + block.centroid[0] * block.orders, 0) / totalOrders;
      const centroidLon = blocks.reduce((sum, block) => sum + block.centroid[1] * block.orders, 0) / totalOrders;
      const available = blocks.slice();
      const seeds = [];

      const first = chooseSurfaceStartBlock(available, centroidLat, centroidLon) || available[0];
      if (first) {
        seeds.push(first);
      }

      while (seeds.length < seedCount && seeds.length < available.length) {
        let best = null;
        let bestScore = -Infinity;

        for (const block of available) {
          if (seeds.some((seed) => seed.id === block.id)) {
            continue;
          }
          let minDistance = Infinity;
          for (const seed of seeds) {
            minDistance = Math.min(minDistance, getBlockDistance(seed, block));
          }
          const surface = computeBlockSurfaceScore(block, centroidLat, centroidLon);
          const score = minDistance * 1.2 + block.orders * 2.5 + surface * 0.2;
          if (score > bestScore) {
            bestScore = score;
            best = block;
          }
        }

        if (!best) {
          break;
        }
        seeds.push(best);
      }

      return seeds;
    }

    const MAX_REGULAR_JUMP_METERS = 2000;
    const OUTLIER_RELOCATION_JUMP_METERS = 900;
    const OUTLIER_RELOCATION_IMPROVEMENT_METERS = 450;
    const OUTLIER_RELOCATION_MAX_SHARE = 0.35;
    const DETACHED_GROUP_LINK_METERS = 320;
    const DETACHED_GROUP_MIN_OWN_DISTANCE_METERS = 700;
    const DETACHED_GROUP_MIN_IMPROVEMENT_METERS = 250;
    const DETACHED_GROUP_MAX_SHARE = 0.4;
    const ISLAND_NEAR_CANDIDATE_WINDOW_METERS = 500;
    const ISLAND_NEAR_CANDIDATE_LIMIT = 5;

    function getJumpOrderFactor(jumpMeters) {
      if (!Number.isFinite(jumpMeters) || jumpMeters <= 0) {
        return 1;
      }
      if (jumpMeters <= 250) {
        return 1.1;
      }
      if (jumpMeters >= 1000) {
        return 0.9;
      }
      const ratio = (jumpMeters - 250) / 750;
      return 1.1 - (ratio * 0.2);
    }

    function applyJumpWeightedTargets(zones, globalTarget) {
      for (const zone of zones) {
        const factor = getJumpOrderFactor(zone.maxStepMeters);
        zone.jumpOrderFactor = factor;
        zone.preferredTarget = globalTarget * factor;
        zone.target = globalTarget;
        zone.minTarget = globalTarget * 0.9;
        zone.maxTarget = globalTarget * 1.1;
        zone.deviationPct = zone.target ? ((zone.orders - zone.target) / zone.target) * 100 : 0;
      }
    }

    function createGrowingZone(seed, index) {
      return {
        id: index + 1,
        seedId: seed.id,
        blockIds: [seed.id],
        blockIdSet: new Set([seed.id]),
        orders: seed.orders,
        jumpMeters: 0
      };
    }

    function collectFrontierBlockIds(zone, unassignedIds, blockMap) {
      const frontier = new Set();
      for (const blockId of zone.blockIds) {
        const block = blockMap.get(blockId);
        for (const neighborId of getNeighborBlockIds(block)) {
          if (unassignedIds.has(neighborId)) {
            frontier.add(neighborId);
          }
        }
      }
      return Array.from(frontier);
    }

    function scoreConnectedExpansion(zone, block, blockMap, globalTarget, forceJump = false) {
      let minDistance = Infinity;
      let sameDong = false;
      let sameStreet = false;

      for (const assignedId of zone.blockIds) {
        const assigned = blockMap.get(assignedId);
        if (!assigned) {
          continue;
        }
        minDistance = Math.min(minDistance, getBlockDistance(assigned, block));
        if (!sameDong && assigned.dongs && block.dongs) {
          sameDong = assigned.dongs.some((dong) => block.dongs.includes(dong));
        }
        if (!sameStreet && assigned.street_stems && block.street_stems) {
          sameStreet = assigned.street_stems.some((street) => block.street_stems.includes(street));
        }
      }

      const projectedOrders = zone.orders + block.orders;
      const projectedJump = Math.max(zone.jumpMeters || 0, minDistance);
      if (!forceJump && projectedJump > MAX_REGULAR_JUMP_METERS) {
        return {
          score: 900000000 + (projectedJump - MAX_REGULAR_JUMP_METERS) * 10000,
          minDistance,
          projectedJump
        };
      }
      const preferredTarget = globalTarget * getJumpOrderFactor(projectedJump);
      const hardMin = globalTarget * 0.9;
      const hardMax = globalTarget * 1.1;
      const underTarget = Math.max(0, preferredTarget - zone.orders);
      const overflowPenalty = Math.max(0, projectedOrders - hardMax) * 220;
      const shortagePenalty = projectedOrders < hardMin ? (hardMin - projectedOrders) * 14 : 0;
      const preferencePenalty = Math.abs(projectedOrders - preferredTarget) * 4;
      const jumpPenalty = minDistance > 1000
        ? 28000 + (minDistance - 1000) * 60
        : minDistance > 800
          ? 9000 + (minDistance - 800) * 14
          : minDistance > 400
            ? (minDistance - 400) * 7
            : 0;
      const forceJumpPenalty = forceJump ? 45000 + minDistance * 12 : 0;
      const fillBonus = underTarget * 8;
      const sameDongBonus = sameDong ? 120 : 0;
      const sameStreetBonus = sameStreet ? 180 : 0;

      return {
        score: (
          minDistance * 2.8 +
          overflowPenalty +
          shortagePenalty +
          preferencePenalty +
          jumpPenalty +
          forceJumpPenalty -
          fillBonus -
          sameDongBonus -
          sameStreetBonus
        ),
        minDistance,
        projectedJump
      };
    }

    function buildZoneFromBlocks(zoneIndex, blockIds, blockMap, recordsByBlock, globalTarget) {
      const blocks = blockIds.map((id) => blockMap.get(id)).filter(Boolean);
      const scopeRecords = blocks.flatMap((block) => recordsByBlock.get(block.id) || []);
      const orderedRecords = buildRecordTraversal(scopeRecords, blocks);
      const zone = createZone(zoneIndex, globalTarget, globalTarget * 0.9, globalTarget * 1.1);
      zone.records = orderedRecords.slice();
      refreshZoneMetrics(zone);
      return zone;
    }

    function extractZoneBlockState(zone) {
      const blockIds = Array.from(new Set(zone.records.map((record) => record.block_id).filter(Boolean)));
      return {
        id: zone.id,
        blockIds,
        blockIdSet: new Set(blockIds)
      };
    }

    function getMinDistanceBetweenBlockSets(leftIds, rightIds, blockMap) {
      let best = Infinity;
      for (const leftId of leftIds) {
        const left = blockMap.get(leftId);
        if (!left) {
          continue;
        }
        for (const rightId of rightIds) {
          if (leftId === rightId) {
            return 0;
          }
          const right = blockMap.get(rightId);
          if (!right) {
            continue;
          }
          best = Math.min(best, getBlockDistance(left, right));
        }
      }
      return best;
    }

    function getZoneBlockGroups(zoneState, blockMap) {
      const remaining = new Set(zoneState.blockIds);
      const groups = [];

      while (remaining.size) {
        const firstId = remaining.values().next().value;
        const queue = [firstId];
        remaining.delete(firstId);
        const ids = [];
        let orders = 0;

        while (queue.length) {
          const currentId = queue.shift();
          ids.push(currentId);
          const current = blockMap.get(currentId);
          if (!current) {
            continue;
          }
          orders += current.orders || 0;
          for (const neighborId of getNeighborBlockIds(current)) {
            if (remaining.has(neighborId)) {
              remaining.delete(neighborId);
              queue.push(neighborId);
            }
          }
        }

        groups.push({ ids, orders });
      }

      return groups.sort((a, b) => b.orders - a.orders);
    }

    function rebalanceIslandGroups(zones, blockMap, recordsByBlock, globalTarget) {
      const zoneStates = zones.map(extractZoneBlockState);

      for (let pass = 0; pass < 6; pass += 1) {
        const builtZones = zoneStates.map((zoneState, index) =>
          buildZoneFromBlocks(index, zoneState.blockIds, blockMap, recordsByBlock, globalTarget)
        );
        applyJumpWeightedTargets(builtZones, globalTarget);

        let changed = false;

        for (let ownerIndex = 0; ownerIndex < zoneStates.length; ownerIndex += 1) {
          const ownerState = zoneStates[ownerIndex];
          const ownerZone = builtZones[ownerIndex];
          const groups = getZoneBlockGroups(ownerState, blockMap);
          if (groups.length <= 1) {
            continue;
          }

          const mainGroup = groups[0];
          const movableGroups = groups.slice(1).sort((a, b) => b.orders - a.orders);

          for (const group of movableGroups) {
            if (group.ids.length >= ownerState.blockIds.length) {
              continue;
            }

            const ownerGap = getMinDistanceBetweenBlockSets(group.ids, mainGroup.ids, blockMap);
            let bestReceiverIndex = -1;
            let bestReceiverDistance = Infinity;

            for (let receiverIndex = 0; receiverIndex < zoneStates.length; receiverIndex += 1) {
              if (receiverIndex === ownerIndex) {
                continue;
              }
              const distance = getMinDistanceBetweenBlockSets(group.ids, zoneStates[receiverIndex].blockIds, blockMap);
              if (distance < bestReceiverDistance) {
                bestReceiverDistance = distance;
                bestReceiverIndex = receiverIndex;
              }
            }

            if (bestReceiverIndex < 0) {
              continue;
            }

            const receiverZone = builtZones[bestReceiverIndex];
            const movedOrders = group.orders;
            const ownerAfter = ownerZone.orders - movedOrders;
            const receiverAfter = receiverZone.orders + movedOrders;
            const ownerSlack = globalTarget * 0.03;
            const receiverSlack = globalTarget * 0.03;
            const improvesDistance = bestReceiverDistance + 80 < ownerGap || ownerZone.maxStepMeters > 1000;
            const keepsBalance =
              ownerAfter >= ownerZone.minTarget - ownerSlack &&
              receiverAfter <= receiverZone.maxTarget + receiverSlack;

            if (!improvesDistance || !keepsBalance) {
              continue;
            }

            ownerState.blockIds = ownerState.blockIds.filter((blockId) => !group.ids.includes(blockId));
            ownerState.blockIdSet = new Set(ownerState.blockIds);
            const receiverState = zoneStates[bestReceiverIndex];
            receiverState.blockIds = receiverState.blockIds.concat(group.ids);
            receiverState.blockIdSet = new Set(receiverState.blockIds);
            changed = true;
            break;
          }

          if (changed) {
            break;
          }
        }

        if (!changed) {
          break;
        }
      }

      const rebuilt = zoneStates.map((zoneState, index) =>
        buildZoneFromBlocks(index, zoneState.blockIds, blockMap, recordsByBlock, globalTarget)
      );
      applyJumpWeightedTargets(rebuilt, globalTarget);
      return rebuilt;
    }

    function assignMinorComponentsToNearestZones(zones, minorComponents, blockMap, recordsByBlock, globalTarget) {
      if (!minorComponents.length || !zones.length) {
        return zones;
      }

      const zoneStates = zones.map((zone) => ({
        id: zone.id,
        blockIds: Array.from(new Set(zone.records.map((record) => record.block_id).filter(Boolean))),
        orders: zone.orders
      }));

      const sortedMinorComponents = minorComponents.slice().sort((a, b) => b.orders - a.orders);

      for (const component of sortedMinorComponents) {
        let best = null;

        for (const zoneState of zoneStates) {
          const zoneBlocks = zoneState.blockIds;
          const jumpMeters = getMinDistanceBetweenBlockSets(component.blockIds, zoneBlocks, blockMap);
          const projectedJump = Math.max(jumpMeters, 0);
          const preferredTarget = globalTarget * getJumpOrderFactor(projectedJump);
          const minTarget = globalTarget * 0.9;
          const maxTarget = globalTarget * 1.1;
          const projectedOrders = zoneState.orders + component.orders;
          const overflow = Math.max(0, projectedOrders - (maxTarget + globalTarget * 0.04));
          const shortage = Math.max(0, minTarget - projectedOrders);
          const score =
            jumpMeters * 3.5 +
            overflow * 240 +
            shortage * 8 +
            Math.abs(projectedOrders - preferredTarget) * 2;

          if (!best || score < best.score) {
            best = { zoneState, score };
          }
        }

        if (!best) {
          continue;
        }

        best.zoneState.blockIds = best.zoneState.blockIds.concat(component.blockIds);
        best.zoneState.orders += component.orders;
      }

      return zoneStates.map((zoneState, index) =>
        buildZoneFromBlocks(index, zoneState.blockIds, blockMap, recordsByBlock, globalTarget)
      );
    }

    function buildZoneStatesFromZones(zones, blockMap) {
      return zones.map((zone) => {
        const blockIds = Array.from(new Set(zone.records.map((record) => record.block_id).filter(Boolean)));
        return {
          id: zone.id,
          blockIds,
          blockIdSet: new Set(blockIds),
          orders: blockIds.reduce((sum, blockId) => sum + (blockMap.get(blockId)?.orders || 0), 0)
        };
      });
    }

    function isConnectedBlockSet(blockIds, blockMap) {
      if (blockIds.length <= 1) {
        return true;
      }
      const allowed = new Set(blockIds);
      const queue = [blockIds[0]];
      const seen = new Set([blockIds[0]]);

      while (queue.length) {
        const currentId = queue.shift();
        const current = blockMap.get(currentId);
        if (!current) {
          continue;
        }
        for (const neighborId of getNeighborBlockIds(current)) {
          if (allowed.has(neighborId) && !seen.has(neighborId)) {
            seen.add(neighborId);
            queue.push(neighborId);
          }
        }
      }

      return seen.size === allowed.size;
    }

    function getTransferableBoundaryBlocks(receiverState, donorState, blockMap) {
      const candidates = [];

      for (const blockId of donorState.blockIds) {
        const block = blockMap.get(blockId);
        if (!block) {
          continue;
        }

        const touchesReceiver = getNeighborBlockIds(block).some((neighborId) => receiverState.blockIdSet.has(neighborId));
        const distanceToReceiver = getMinDistanceBetweenBlockSets([blockId], receiverState.blockIds, blockMap);
        if (!touchesReceiver && distanceToReceiver > 220) {
          continue;
        }

        const nextDonorBlockIds = donorState.blockIds.filter((id) => id !== blockId);
        if (nextDonorBlockIds.length && !isConnectedBlockSet(nextDonorBlockIds, blockMap)) {
          continue;
        }

        candidates.push({
          blockId,
          orders: block.orders || 0,
          distanceToReceiver
        });
      }

      return candidates.sort((a, b) => a.distanceToReceiver - b.distanceToReceiver || a.orders - b.orders);
    }

    function balanceZonesWithinHardBand(zones, blockMap, recordsByBlock, globalTarget) {
      if (zones.length <= 1) {
        return zones;
      }

      const minTarget = globalTarget * 0.9;
      const maxTarget = globalTarget * 1.1;
      const zoneStates = buildZoneStatesFromZones(zones, blockMap);

      for (let pass = 0; pass < 240; pass += 1) {
        let bestMove = null;
        const hasOverfilledZone = zoneStates.some((zoneState) => zoneState.orders > maxTarget);

        for (let receiverIndex = 0; receiverIndex < zoneStates.length; receiverIndex += 1) {
          const receiverState = zoneStates[receiverIndex];
          const receiverCanImprove = receiverState.orders < minTarget || (hasOverfilledZone && receiverState.orders < globalTarget);
          if (!receiverCanImprove) {
            continue;
          }

          for (let donorIndex = 0; donorIndex < zoneStates.length; donorIndex += 1) {
            if (donorIndex === receiverIndex) {
              continue;
            }

            const donorState = zoneStates[donorIndex];
            if (donorState.orders <= minTarget && donorState.orders <= maxTarget) {
              continue;
            }

            const candidates = getTransferableBoundaryBlocks(receiverState, donorState, blockMap);
            for (const candidate of candidates) {
              const projectedReceiver = receiverState.orders + candidate.orders;
              const projectedDonor = donorState.orders - candidate.orders;

              if (projectedDonor < minTarget) {
                continue;
              }

              const beforeViolation =
                Math.max(0, minTarget - receiverState.orders) +
                Math.max(0, receiverState.orders - maxTarget) +
                Math.max(0, minTarget - donorState.orders) +
                Math.max(0, donorState.orders - maxTarget);

              const afterViolation =
                Math.max(0, minTarget - projectedReceiver) +
                Math.max(0, projectedReceiver - maxTarget) +
                Math.max(0, minTarget - projectedDonor) +
                Math.max(0, projectedDonor - maxTarget);

              const improvement = beforeViolation - afterViolation;
              if (improvement <= 0) {
                continue;
              }

              const score =
                improvement * 10000 -
                candidate.distanceToReceiver * 12 -
                Math.abs(projectedReceiver - globalTarget) * 8 -
                Math.abs(projectedDonor - globalTarget) * 4;

              if (!bestMove || score > bestMove.score) {
                bestMove = {
                  receiverIndex,
                  donorIndex,
                  blockId: candidate.blockId,
                  blockOrders: candidate.orders,
                  score
                };
              }
            }
          }
        }

        if (!bestMove) {
          break;
        }

        const receiverState = zoneStates[bestMove.receiverIndex];
        const donorState = zoneStates[bestMove.donorIndex];
        donorState.blockIds = donorState.blockIds.filter((id) => id !== bestMove.blockId);
        donorState.blockIdSet = new Set(donorState.blockIds);
        donorState.orders -= bestMove.blockOrders;
        receiverState.blockIds.push(bestMove.blockId);
        receiverState.blockIdSet = new Set(receiverState.blockIds);
        receiverState.orders += bestMove.blockOrders;
      }

      return zoneStates.map((zoneState, index) =>
        buildZoneFromBlocks(index, zoneState.blockIds, blockMap, recordsByBlock, globalTarget)
      );
    }

    function buildZonesFromZoneStates(zoneStates, blockMap, recordsByBlock, globalTarget) {
      return zoneStates.map((zoneState, index) => {
        const zone = buildZoneFromBlocks(index, zoneState.blockIds, blockMap, recordsByBlock, globalTarget);
        zone.id = zoneState.id || index + 1;
        return zone;
      });
    }

    function getHardBandViolation(zone, globalTarget) {
      const minTarget = globalTarget * 0.9;
      const maxTarget = globalTarget * 1.1;
      return Math.max(0, minTarget - zone.orders) + Math.max(0, zone.orders - maxTarget);
    }

    function getZoneStateMinDistance(selectedIndices, candidateIndex, zoneStates, blockMap) {
      let best = Infinity;
      for (const selectedIndex of selectedIndices) {
        best = Math.min(
          best,
          getMinDistanceBetweenBlockSets(
            zoneStates[selectedIndex].blockIds,
            zoneStates[candidateIndex].blockIds,
            blockMap
          )
        );
      }
      return best;
    }

    function repartitionZoneCluster(zoneStates, selectedIndices, blockMap, recordsByBlock, globalTarget) {
      const combinedBlockIds = Array.from(new Set(
        selectedIndices.flatMap((index) => zoneStates[index].blockIds)
      ));
      const clusterBlocks = combinedBlockIds.map((blockId) => blockMap.get(blockId)).filter(Boolean);
      const clusterRecords = clusterBlocks.flatMap((block) => recordsByBlock.get(block.id) || []);
      const orderedRecords = buildRecordTraversal(clusterRecords, clusterBlocks);
      let repartitioned = splitOrderedRecordsIntoZones(orderedRecords, 0, selectedIndices.length, globalTarget);
      repartitioned = rebalanceSequentialZones(repartitioned, globalTarget);
      repartitioned = balanceZonesWithinHardBand(repartitioned, blockMap, recordsByBlock, globalTarget);
      return repartitioned;
    }

    function enforceHardOrderBand(zones, blockMap, recordsByBlock, globalTarget) {
      if (zones.length <= 1) {
        return zones;
      }

      let zoneStates = buildZoneStatesFromZones(zones, blockMap);
      const maxClusterSize = Math.min(8, zoneStates.length);

      for (let pass = 0; pass < 18; pass += 1) {
        const currentZones = buildZonesFromZoneStates(zoneStates, blockMap, recordsByBlock, globalTarget);
        const violations = currentZones.map((zone, index) => ({
          index,
          violation: getHardBandViolation(zone, globalTarget),
          orders: zone.orders
        })).sort((a, b) => b.violation - a.violation);

        if (!violations.length || violations[0].violation <= 0) {
          return currentZones;
        }

        const worst = violations[0];
        const minTarget = globalTarget * 0.9;
        const maxTarget = globalTarget * 1.1;
        const selectedIndices = [worst.index];
        let totalOrders = currentZones[worst.index].orders;

        while (
          (totalOrders < selectedIndices.length * minTarget || totalOrders > selectedIndices.length * maxTarget) &&
          selectedIndices.length < maxClusterSize
        ) {
          let bestCandidate = null;

          for (let candidateIndex = 0; candidateIndex < zoneStates.length; candidateIndex += 1) {
            if (selectedIndices.includes(candidateIndex)) {
              continue;
            }

            const candidateZone = currentZones[candidateIndex];
            const distance = getZoneStateMinDistance(selectedIndices, candidateIndex, zoneStates, blockMap);
            const oppositePressure = totalOrders < selectedIndices.length * minTarget
              ? Math.max(0, candidateZone.orders - globalTarget)
              : Math.max(0, globalTarget - candidateZone.orders);
            const score = distance - oppositePressure * 8;

            if (!bestCandidate || score < bestCandidate.score) {
              bestCandidate = { candidateIndex, score };
            }
          }

          if (!bestCandidate) {
            break;
          }

          selectedIndices.push(bestCandidate.candidateIndex);
          totalOrders += currentZones[bestCandidate.candidateIndex].orders;
        }

        const currentSelectedZones = selectedIndices.map((index) => currentZones[index]);
        const currentViolation = currentSelectedZones.reduce((sum, zone) => sum + getHardBandViolation(zone, globalTarget), 0);
        const candidateZones = repartitionZoneCluster(zoneStates, selectedIndices, blockMap, recordsByBlock, globalTarget);
        const candidateViolation = candidateZones.reduce((sum, zone) => sum + getHardBandViolation(zone, globalTarget), 0);
        const currentTravel = currentSelectedZones.reduce((sum, zone) => sum + zone.travelMeters + zone.maxStepMeters * 2, 0);
        const candidateTravel = candidateZones.reduce((sum, zone) => sum + zone.travelMeters + zone.maxStepMeters * 2, 0);

        if (
          candidateViolation < currentViolation ||
          (candidateViolation === currentViolation && candidateTravel + 300 < currentTravel)
        ) {
          const replacementStates = buildZoneStatesFromZones(candidateZones, blockMap);
          selectedIndices
            .slice()
            .sort((a, b) => a - b)
            .forEach((zoneIndex, localIndex) => {
              zoneStates[zoneIndex] = replacementStates[localIndex];
            });
          continue;
        }

        break;
      }

      return buildZonesFromZoneStates(zoneStates, blockMap, recordsByBlock, globalTarget);
    }

    function growConnectedComponent(component, zoneCount, globalTarget, blockMap, recordsByBlock) {
      if (zoneCount <= 1 || component.blocks.length <= 1) {
        return [buildZoneFromBlocks(0, component.blockIds.slice(), blockMap, recordsByBlock, globalTarget)];
      }

      const seeds = chooseConnectedSeeds(component.blocks, Math.min(zoneCount, component.blocks.length));
      const zones = seeds.map((seed, index) => createGrowingZone(seed, index));
      const unassignedIds = new Set(component.blockIds.filter((id) => !zones.some((zone) => zone.blockIdSet.has(id))));

      while (unassignedIds.size) {
        let best = null;
        let hasAnyFrontier = false;

        for (const zone of zones) {
          if (collectFrontierBlockIds(zone, unassignedIds, blockMap).length) {
            hasAnyFrontier = true;
            break;
          }
        }

        for (const zone of zones) {
          const frontierIds = collectFrontierBlockIds(zone, unassignedIds, blockMap);
          if (hasAnyFrontier && !frontierIds.length) {
            continue;
          }
          const candidateIds = hasAnyFrontier ? frontierIds : Array.from(unassignedIds);
          const forceJump = !hasAnyFrontier;

          for (const blockId of candidateIds) {
            const block = blockMap.get(blockId);
            if (!block) {
              continue;
            }
            const candidate = scoreConnectedExpansion(zone, block, blockMap, globalTarget, forceJump);
            const score = candidate.score + (zone.orders / Math.max(1, globalTarget)) * 420;
            if (!best || score < best.score || (score === best.score && zone.orders < best.zone.orders)) {
              best = {
                zone,
                block,
                score,
                minDistance: candidate.minDistance,
                projectedJump: candidate.projectedJump
              };
            }
          }
        }

        if (!best) {
          break;
        }

        best.zone.blockIds.push(best.block.id);
        best.zone.blockIdSet.add(best.block.id);
        best.zone.orders += best.block.orders;
        best.zone.jumpMeters = Math.max(best.zone.jumpMeters || 0, best.minDistance || 0, best.projectedJump || 0);
        unassignedIds.delete(best.block.id);
      }

      return zones.map((zone, index) => buildZoneFromBlocks(index, zone.blockIds, blockMap, recordsByBlock, globalTarget));
    }

    function getBandViolationForOrders(orders, globalTarget) {
      const minTarget = globalTarget * 0.9;
      const maxTarget = globalTarget * 1.1;
      return Math.max(0, minTarget - orders) + Math.max(0, orders - maxTarget);
    }

    function getRecordDistanceToZone(record, zone) {
      if (!zone.records || !zone.records.length) {
        return 0;
      }
      let best = Infinity;
      for (const assigned of zone.records) {
        if (assigned.id === record.id) {
          continue;
        }
        best = Math.min(best, haversineM(record.lat, record.lon, assigned.lat, assigned.lon));
      }
      return Number.isFinite(best) ? best : 0;
    }

    function reorderZoneRecordsByBlockRoute(zone, blockMap) {
      if (!zone.records || zone.records.length <= 1) {
        refreshZoneMetrics(zone);
        return zone;
      }

      const zoneBlockIds = new Set(zone.records.map((record) => record.block_id).filter(Boolean));
      const zoneBlocks = Array.from(zoneBlockIds).map((id) => blockMap.get(id)).filter(Boolean);
      const zoneBlockRoute = buildBlockTraversal(zoneBlocks);
      const zoneRecsByBlock = new Map();

      for (const record of zone.records) {
        if (!zoneRecsByBlock.has(record.block_id)) {
          zoneRecsByBlock.set(record.block_id, []);
        }
        zoneRecsByBlock.get(record.block_id).push(record);
      }

      for (const recs of zoneRecsByBlock.values()) {
        recs.sort(compareSequentialRecords);
      }

      const ordered = [];
      for (const block of zoneBlockRoute) {
        const recs = zoneRecsByBlock.get(block.id);
        if (recs) {
          ordered.push(...recs);
        }
      }

      for (const [blockId, recs] of zoneRecsByBlock.entries()) {
        if (!zoneBlockRoute.some((block) => block.id === blockId)) {
          ordered.push(...recs);
        }
      }

      zone.records = ordered;
      refreshZoneMetrics(zone);
      return zone;
    }

    function reorderZonesByBlockRoute(zones, blockMap) {
      return zones.map((zone) => reorderZoneRecordsByBlockRoute(zone, blockMap));
    }

    function balanceRecordsWithinHardBand(zones, globalTarget) {
      if (zones.length <= 1) {
        return zones;
      }

      const minTarget = globalTarget * 0.9;
      const maxTarget = globalTarget * 1.1;

      for (let pass = 0; pass < 900; pass += 1) {
        zones.forEach(refreshZoneMetrics);
        const hasUnderfilled = zones.some((zone) => zone.orders < minTarget);
        const hasOverfilled = zones.some((zone) => zone.orders > maxTarget);
        if (!hasUnderfilled && !hasOverfilled) {
          break;
        }

        let bestMove = null;
        for (const receiver of zones) {
          const receiverNeedsOrders = receiver.orders < minTarget || (hasOverfilled && receiver.orders < globalTarget);
          if (!receiverNeedsOrders) {
            continue;
          }

          for (const donor of zones) {
            if (donor.id === receiver.id || donor.orders <= minTarget || !donor.records.length) {
              continue;
            }

            for (const record of donor.records) {
              if (receiver.addressIdsSet && receiver.addressIdsSet.has(record.id)) {
                continue;
              }

              const donorAfter = donor.orders - record.orders;
              const receiverAfter = receiver.orders + record.orders;
              if (donorAfter < minTarget) {
                continue;
              }

              const beforeViolation =
                getBandViolationForOrders(donor.orders, globalTarget) +
                getBandViolationForOrders(receiver.orders, globalTarget);
              const afterViolation =
                getBandViolationForOrders(donorAfter, globalTarget) +
                getBandViolationForOrders(receiverAfter, globalTarget);
              const improvement = beforeViolation - afterViolation;
              if (improvement <= 0) {
                continue;
              }

              const distance = getRecordDistanceToZone(record, receiver);
              if (distance > MAX_REGULAR_JUMP_METERS) {
                continue;
              }
              const overflowPenalty = Math.max(0, receiverAfter - maxTarget) * 120;
              const targetPenalty =
                Math.abs(receiverAfter - globalTarget) * 2 +
                Math.abs(donorAfter - globalTarget);
              const score = improvement * 10000 - distance * 5 - overflowPenalty - targetPenalty;

              if (!bestMove || score > bestMove.score) {
                bestMove = { donor, receiver, record, score };
              }
            }
          }
        }

        if (!bestMove) {
          break;
        }

        bestMove.donor.records = bestMove.donor.records.filter((record) => record.id !== bestMove.record.id);
        if (!bestMove.receiver.records.some((record) => record.id === bestMove.record.id)) {
          bestMove.receiver.records.push(bestMove.record);
        }
        refreshZoneMetrics(bestMove.donor);
        refreshZoneMetrics(bestMove.receiver);
      }

      zones.forEach(refreshZoneMetrics);
      return zones;
    }

    function getPointDistanceToZone(lat, lon, zone) {
      if (!zone.records || !zone.records.length) {
        return Infinity;
      }
      let best = Infinity;
      for (const record of zone.records) {
        best = Math.min(best, haversineM(lat, lon, record.lat, record.lon));
      }
      return best;
    }

    function chooseIslandReceiverZone(zones, lat, lon, blockOrders, globalTarget) {
      const minTarget = globalTarget * 0.9;
      const maxTarget = globalTarget * 1.1;
      const candidates = zones
        .filter((zone) => zone.records && zone.records.length)
        .map((zone) => {
          const distance = getPointDistanceToZone(lat, lon, zone);
          const projectedOrders = zone.orders + blockOrders;
          const projectedJump = Math.max(zone.maxStepMeters || 0, distance);
          const preferredTarget = globalTarget * getJumpOrderFactor(projectedJump);
          const overflow = Math.max(0, projectedOrders - maxTarget);
          const shortage = Math.max(0, minTarget - projectedOrders);
          return {
            zone,
            distance,
            projectedOrders,
            projectedJump,
            score:
              distance * 2.5 +
              overflow * 300 +
              shortage * 4 +
              Math.abs(projectedOrders - preferredTarget) * 2.5
          };
        })
        .filter((item) => Number.isFinite(item.distance));

      if (!candidates.length) {
        return zones[0] || null;
      }

      const regular = candidates
        .filter((item) => item.projectedJump <= MAX_REGULAR_JUMP_METERS && item.projectedOrders <= maxTarget)
        .sort((a, b) => a.score - b.score || a.distance - b.distance || a.zone.orders - b.zone.orders);

      if (regular.length) {
        return regular[0].zone;
      }

      const byDistance = candidates.slice().sort((a, b) => a.distance - b.distance);
      const nearestDistance = byDistance[0].distance;
      const nearPool = byDistance
        .filter((item) => item.distance <= nearestDistance + ISLAND_NEAR_CANDIDATE_WINDOW_METERS)
        .slice(0, Math.max(ISLAND_NEAR_CANDIDATE_LIMIT, 1));
      const fallbackPool = nearPool.length ? nearPool : byDistance.slice(0, ISLAND_NEAR_CANDIDATE_LIMIT);

      return fallbackPool
        .sort((a, b) =>
          a.zone.orders - b.zone.orders ||
          Math.max(0, a.projectedOrders - maxTarget) - Math.max(0, b.projectedOrders - maxTarget) ||
          a.distance - b.distance
        )[0].zone;
    }

    function parseAssignmentsDistanceBased(scope, peopleCount) {
      const records = cloneScopeRecords(scope);
      if (!records.length) {
        return [];
      }

      const zoneCount = Math.max(1, Number(peopleCount) || 1);
      const target = scope.total_orders / zoneCount;
      const blockMap = new Map((scope.blocks || []).map(b => [b.id, b]));
      const recordsByBlock = buildRecordsByBlock(records);

      // 1. Identify island blocks
      const islandBlocksIds = new Set();
      const nonIslandBlocks = [];
      const islandBlocks = [];
      const islandThresholdM = 220.0;

      for (const block of scope.blocks || []) {
        const neighbors = block.neighbors || [];
        let isIsolated = false;
        if (neighbors.length === 0) {
          isIsolated = true;
        } else {
          const minDist = Math.min(...neighbors.map(n => n.distance_m));
          if (minDist > islandThresholdM) {
            isIsolated = true;
          }
        }

        if (isIsolated) {
          islandBlocksIds.add(block.id);
          islandBlocks.push(block);
        } else {
          nonIslandBlocks.push(block);
        }
      }

      // 2. Separate records into non-island and island records
      const nonIslandRecords = records.filter(r => !islandBlocksIds.has(r.block_id));
      const islandRecords = records.filter(r => islandBlocksIds.has(r.block_id));

      // 3. Sequential assignment on non-island records
      const orderedRecords = buildRecordTraversal(nonIslandRecords, nonIslandBlocks);
      let zones = splitOrderedRecordsIntoZones(orderedRecords, 0, zoneCount, target);
      zones = rebalanceSequentialZones(zones, target);

      while (zones.length < zoneCount) {
        const zone = createZone(zones.length, target, target * 0.9, target * 1.1);
        refreshZoneMetrics(zone);
        zones.push(zone);
      }

      for (const z of zones) {
        refreshZoneMetrics(z);
      }

      // 4. Assign island records to the geographically closest zone (using nearest record distance)
      const islandRecordsByBlock = new Map();
      for (const r of islandRecords) {
        if (!islandRecordsByBlock.has(r.block_id)) {
          islandRecordsByBlock.set(r.block_id, []);
        }
        islandRecordsByBlock.get(r.block_id).push(r);
      }

      for (const [blockId, recs] of islandRecordsByBlock.entries()) {
        const block = islandBlocks.find(b => b.id === blockId);
        if (!block) continue;
        const bLat = block.centroid[0];
        const bLon = block.centroid[1];
        const blockOrders = recs.reduce((sum, r) => sum + r.orders, 0);
        const bestZone = chooseIslandReceiverZone(zones, bLat, bLon, blockOrders, target) || zones[0];

        bestZone.records.push(...recs);
        refreshZoneMetrics(bestZone);
      }

      // 5. Re-sort records inside each zone to ensure a clean greedy block traversal route
      for (const z of zones) {
        if (!z.records || z.records.length === 0) continue;

        const zoneBlockIds = new Set(z.records.map(r => r.block_id).filter(Boolean));
        const zoneBlocks = Array.from(zoneBlockIds).map(id => blockMap.get(id)).filter(Boolean);

        const zoneBlockRoute = buildBlockTraversal(zoneBlocks);

        const zoneRecsByBlock = new Map();
        for (const r of z.records) {
          if (!zoneRecsByBlock.has(r.block_id)) {
            zoneRecsByBlock.set(r.block_id, []);
          }
          zoneRecsByBlock.get(r.block_id).push(r);
        }

        for (const [blockId, recs] of zoneRecsByBlock.entries()) {
          recs.sort(compareSequentialRecords);
        }

        const orderedZoneRecords = [];
        for (const block of zoneBlockRoute) {
          const recs = zoneRecsByBlock.get(block.id);
          if (recs) {
            orderedZoneRecords.push(...recs);
          }
        }

        const fallbackRecs = [];
        for (const [blockId, recs] of zoneRecsByBlock.entries()) {
          const inRoute = zoneBlockRoute.some(b => b.id === blockId);
          if (!inRoute) {
            fallbackRecs.push(...recs);
          }
        }
        if (fallbackRecs.length > 0) {
          orderedZoneRecords.push(...fallbackRecs);
        }

        z.records = orderedZoneRecords;
        refreshZoneMetrics(z);
      }

      zones = rebalanceIslandGroups(zones, blockMap, recordsByBlock, target);
      zones = balanceZonesWithinHardBand(zones, blockMap, recordsByBlock, target);
      zones = enforceHardOrderBand(zones, blockMap, recordsByBlock, target);
      zones = balanceZonesWithinHardBand(zones, blockMap, recordsByBlock, target);
      zones = balanceRecordsWithinHardBand(zones, target);
      zones = enforceUniqueRecordAssignments(zones, records, target);
      zones = reorderZonesByBlockRoute(zones, blockMap);
      zones = reassignDetachedGroupsToNearestZones(zones, blockMap, target);
      zones = enforceUniqueRecordAssignments(zones, records, target);
      zones = reorderZonesByBlockRoute(zones, blockMap);
      zones = reduceOutlierRouteJumps(zones, blockMap, target);
      zones = enforceUniqueRecordAssignments(zones, records, target);
      zones = reorderZonesByBlockRoute(zones, blockMap);
      applyJumpWeightedTargets(zones, target);

      return zones
        .map((zone) => {
          refreshZoneMetrics(zone);
          return zone;
        })
        .sort((a, b) => a.id - b.id);
    }

    function compareLotSequentialRecords(left, right) {
      const leftDong = left.dong || "";
      const rightDong = right.dong || "";
      if (leftDong !== rightDong) {
        return leftDong.localeCompare(rightDong, "ko");
      }

      const leftMain = Number.isFinite(left.lot_main) ? left.lot_main : Number.POSITIVE_INFINITY;
      const rightMain = Number.isFinite(right.lot_main) ? right.lot_main : Number.POSITIVE_INFINITY;
      if (leftMain !== rightMain) {
        return leftMain - rightMain;
      }

      const leftSub = Number.isFinite(left.lot_sub) ? left.lot_sub : -1;
      const rightSub = Number.isFinite(right.lot_sub) ? right.lot_sub : -1;
      if (leftSub !== rightSub) {
        return leftSub - rightSub;
      }

      const leftRoad = left.road_stem || "";
      const rightRoad = right.road_stem || "";
      if (leftRoad !== rightRoad) {
        return leftRoad.localeCompare(rightRoad, "ko", { numeric: true });
      }

      return String(left.address || "").localeCompare(String(right.address || ""), "ko", { numeric: true });
    }

    function buildLotSequentialRecords(records) {
      return records.slice().sort(compareLotSequentialRecords);
    }

    function getLotSegmentCost(records, start, end, orders, target, minTarget, maxTarget) {
      const violation = Math.max(0, minTarget - orders) + Math.max(0, orders - maxTarget);
      let cost = violation * violation * 100000 + Math.abs(orders - target) * 120;

      let dongChanges = 0;
      let largeLotGaps = 0;
      for (let index = start + 1; index < end; index += 1) {
        const prev = records[index - 1];
        const current = records[index];
        if ((prev.dong || "") !== (current.dong || "")) {
          dongChanges += 1;
          continue;
        }
        if (Number.isFinite(prev.lot_main) && Number.isFinite(current.lot_main)) {
          const gap = Math.abs(current.lot_main - prev.lot_main);
          if (gap > 25) {
            largeLotGaps += 1;
          }
        }
      }

      cost += dongChanges * 12000 + largeLotGaps * 1200;
      return cost;
    }

    function splitLotSequentialRecordsIntoZones(orderedRecords, zoneCount, target) {
      const n = orderedRecords.length;
      const minTarget = target * 0.9;
      const maxTarget = target * 1.1;
      const prefix = new Array(n + 1).fill(0);
      for (let index = 0; index < n; index += 1) {
        prefix[index + 1] = prefix[index] + orderedRecords[index].orders;
      }

      const dp = Array.from({ length: zoneCount + 1 }, () => new Float64Array(n + 1));
      const prev = Array.from({ length: zoneCount + 1 }, () => new Int32Array(n + 1));
      for (let z = 0; z <= zoneCount; z += 1) {
        dp[z].fill(Number.POSITIVE_INFINITY);
        prev[z].fill(-1);
      }
      dp[0][0] = 0;

      const hardSearchMax = Math.max(maxTarget * 1.35, maxTarget + 80);
      for (let z = 1; z <= zoneCount; z += 1) {
        for (let end = z; end <= n; end += 1) {
          for (let start = end - 1; start >= z - 1; start -= 1) {
            const orders = prefix[end] - prefix[start];
            if (orders > hardSearchMax && end - start > 1) {
              break;
            }
            if (!Number.isFinite(dp[z - 1][start])) {
              continue;
            }

            const segmentCost = getLotSegmentCost(orderedRecords, start, end, orders, target, minTarget, maxTarget);
            const totalCost = dp[z - 1][start] + segmentCost;
            if (totalCost < dp[z][end]) {
              dp[z][end] = totalCost;
              prev[z][end] = start;
            }
          }
        }
      }

      if (prev[zoneCount][n] < 0) {
        return splitOrderedRecordsIntoZones(orderedRecords, 0, zoneCount, target);
      }

      const segments = [];
      let cursor = n;
      for (let z = zoneCount; z >= 1; z -= 1) {
        const start = prev[z][cursor];
        segments.push([start, cursor]);
        cursor = start;
      }
      segments.reverse();

      return segments.map(([start, end], index) => {
        const zone = createZone(index, target, minTarget, maxTarget);
        zone.records = orderedRecords.slice(start, end);
        refreshZoneMetrics(zone);
        return zone;
      });
    }

    function parseAssignments(scope, peopleCount) {
      const records = cloneScopeRecords(scope);
      if (!records.length) {
        return [];
      }

      const zoneCount = Math.max(1, Number(peopleCount) || 1);
      const target = scope.total_orders / zoneCount;
      const orderedRecords = buildLotSequentialRecords(records);
      let zones = splitLotSequentialRecordsIntoZones(orderedRecords, zoneCount, target);

      while (zones.length < zoneCount) {
        const zone = createZone(zones.length, target, target * 0.9, target * 1.1);
        refreshZoneMetrics(zone);
        zones.push(zone);
      }

      zones = enforceUniqueRecordAssignments(zones, records, target);
      zones.forEach((zone) => {
        zone.records = buildLotSequentialRecords(zone.records || []);
        refreshZoneMetrics(zone);
      });
      applyJumpWeightedTargets(zones, target);

      return zones
        .map((zone) => {
          refreshZoneMetrics(zone);
          return zone;
        })
        .sort((a, b) => a.id - b.id);
    }

    function zoneDetailHtml(zone) {
      const rows = zone.records.map((record, index) => `
        <div class="detail-row">
          <div class="k">${index + 1}</div>
          <div class="v">
            <button type="button" class="zone-record-link" data-record-id="${record.id}">
              ${record.address}
            </button>
            <div class="zone-record-meta">오더 ${formatNumber(record.orders)} / 지번 ${record.jibun_address || "-"}</div>
          </div>
        </div>
      `).join("");

      return `
        <div class="detail-topbar">
        </div>
        <div class="detail-grid">${rows || '<div class="helper">배정 주소가 없습니다.</div>'}</div>
      `;
    }

    function openZoneDetailPanel(zone) {
      state.lastZoneDetailId = zone.id;
      openDetailPanel(`인원 ${zone.id} 주소목록`, zoneDetailHtml(zone));
      bindDetailPanelEvents();
    }

    function renderAssignmentTable(assignments) {
      const table = document.getElementById("assignment-table");
      if (!assignments.length) {
        table.innerHTML = `<div class="helper">인원을 입력하고 배정 실행을 누르면 배정 결과가 표시됩니다.</div>`;
        return;
      }

      table.innerHTML = assignments.map((item) => `
        <div class="assignment-row ${state.selectedZoneId === item.id ? "active" : ""}" data-zone-id="${item.id}">
          <div class="swatch" style="background:${item.color}"></div>
          <div>
            <div class="row-title">인원 ${item.id}</div>
            <div class="row-sub">주소 ${formatNumber(item.addressCount)} / 동선 ${Math.round(item.travelMeters)}m / 점프 ${Math.round(item.maxStepMeters)}m</div>
          </div>
          <div class="row-value">${formatNumber(item.orders)}건</div>
        </div>
      `).join("");

      Array.from(table.querySelectorAll(".assignment-row")).forEach((row) => {
        row.addEventListener("click", () => {
          const zoneId = Number(row.dataset.zoneId);
          state.selectedZoneId = state.selectedZoneId === zoneId ? null : zoneId;
          updateAssignmentVisibility();
          renderAssignmentTable(state.currentAssignments);
          const zone = state.currentAssignments.find((item) => item.id === zoneId);
          if (zone && state.selectedZoneId === zoneId) {
            openZoneDetailPanel(zone);
            focusZone(zone);
          }
        });
      });
    }

    async function loadAppData() {
      if (APP && APP.scopes && Object.keys(APP.scopes).length) {
        return APP;
      }

      const response = await fetch(`./safety_assignment_app_data.json?ts=${Date.now()}`, {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`Failed to load data: ${response.status}`);
      }

      APP = await response.json();
      return APP;
    }

    function removeExistingNaverSdkScripts() {
      Array.from(document.querySelectorAll('script[data-naver-maps-sdk="1"]')).forEach((node) => node.remove());
    }

    function tryLoadNaverSdk(src) {
      return new Promise((resolve, reject) => {
        removeExistingNaverSdkScripts();

        const timeoutId = window.setTimeout(() => {
          reject(new Error(`timeout: ${src}`));
        }, 12000);

        const finishSuccess = () => {
          window.clearTimeout(timeoutId);
          resolve();
        };

        const finishError = (message) => {
          window.clearTimeout(timeoutId);
          reject(new Error(message));
        };

        const script = document.createElement("script");
        script.async = true;
        script.defer = true;
        script.dataset.naverMapsSdk = "1";
        script.src = src;
        script.onerror = () => finishError(`load_error: ${src}`);
        script.onload = () => {
          if (window.naver && window.naver.maps) {
            finishSuccess();
          }
        };
        document.head.appendChild(script);
      });
    }

    async function loadNaverMapsSdk() {
      if (window.naver && window.naver.maps) {
        return window.naver.maps;
      }
      if (naverSdkPromise) {
        return naverSdkPromise;
      }

      const candidates = [
        `https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=${encodeURIComponent(NAVER_MAPS_KEY_ID)}`
      ];

      naverSdkPromise = (async () => {
        let lastError = null;
        for (const src of candidates) {
          try {
            await tryLoadNaverSdk(src);
            if (window.naver && window.naver.maps) {
              return window.naver.maps;
            }
          } catch (error) {
            lastError = error;
          }
        }
        throw lastError || new Error("naver_maps_sdk_unavailable");
      })();

      return naverSdkPromise;
    }

    async function boot() {
      try {
        await loadAppData();
      } catch (error) {
        setStatus(`배정 데이터 로드 실패: ${error.message}`, true);
        return;
      }

      try {
        await loadNaverMapsSdk();
      } catch (error) {
        setStatus(`네이버 지도 SDK를 불러오지 못했습니다. ${error.message}`, true);
        return;
      }

      if (!APP || !APP.scopes || !Object.keys(APP.scopes).length) {
        setStatus("배정 데이터가 없습니다.", true);
        return;
      }

      if (!window.naver || !window.naver.maps) {
        setStatus("네이버 지도 SDK를 불러오지 못했습니다.", true);
        return;
      }

      state.map = new naver.maps.Map("map", {
        center: new naver.maps.LatLng(36.3504119, 127.3845475),
        size: new naver.maps.Size(window.innerWidth, window.innerHeight),
        zoom: 12,
        mapTypeControl: true,
        zoomControl: false
      });

      naver.maps.Event.addListener(state.map, "idle", updatePointMarkerStyles);

      state.infoWindow = new naver.maps.InfoWindow({
        backgroundColor: "#ffffff",
        borderColor: "#cdd6ea",
        anchorSize: new naver.maps.Size(14, 14)
      });

      state.cadastralLayer = new naver.maps.CadastralLayer();
      state.cadastralLayer.setMap(state.map);

      document.querySelector("#panel h1").textContent = "단독주택 안전점검 배정";
      document.getElementById("assign-btn").textContent = "배정 실행";
      document.getElementById("clear-btn").textContent = "하이라이트 초기화";
      document.getElementById("export-btn").textContent = "엑셀 저장";
      document.getElementById("reset-map").textContent = "지도 초기화";

      populateFilters();
      updateScopeView();

      document.getElementById("center-select").addEventListener("change", updateScopeView);
      document.getElementById("month-select").addEventListener("change", updateScopeView);
      document.getElementById("people-input").addEventListener("input", () => updateStats(getScope()));
      document.getElementById("assign-btn").addEventListener("click", runAssignment);
      document.getElementById("clear-btn").addEventListener("click", clearHighlights);
      document.getElementById("export-btn").addEventListener("click", exportAssignmentsToXlsx);
      document.getElementById("toggle-panel").addEventListener("click", togglePanel);
      document.getElementById("toggle-detail-panel").addEventListener("click", toggleDetailPanel);
      document.getElementById("toggle-cadastral").addEventListener("click", toggleCadastral);
      document.getElementById("toggle-points").addEventListener("click", togglePoints);
      document.getElementById("fit-all").addEventListener("click", () => fitScope(getScope()));
      document.getElementById("reset-map").addEventListener("click", resetMapView);
      document.getElementById("zoom-in-btn").addEventListener("click", () => {
        state.map.setZoom(state.map.getZoom() + 1, true);
      });
      document.getElementById("zoom-out-btn").addEventListener("click", () => {
        state.map.setZoom(state.map.getZoom() - 1, true);
      });
      document.getElementById("search-btn").addEventListener("click", runSearch);
      document.getElementById("search-input").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          runSearch();
        }
      });

      window.addEventListener("resize", syncMapSize);
      syncMapSize();
    }

    window.navermap_authFailure = function () {
      naverSdkPromise = null;
      setStatus("네이버 지도 인증 실패. localhost 또는 127.0.0.1 등록과 Client ID를 확인하세요.", true);
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", boot);
    } else {
      boot();
    }
  </script>
