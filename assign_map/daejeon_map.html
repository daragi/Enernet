<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단독주택 안전점검 배정</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #dbeafe;
      --surface: rgba(255, 255, 255, 0.95);
      --surface-strong: rgba(255, 255, 255, 0.99);
      --line: rgba(148, 163, 184, 0.28);
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      --danger: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #map {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
    }

    .toolbar {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 30;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      max-width: calc(100vw - 32px);
    }

    .search {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      gap: 8px;
      width: min(540px, calc(100vw - 32px));
    }

    .panel {
      position: fixed;
      top: 68px;
      left: 16px;
      z-index: 25;
      width: min(368px, calc(100vw - 32px));
      max-height: calc(100vh - 128px);
      overflow: auto;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .panel.hidden {
      display: none;
    }

    .detail-panel {
      position: fixed;
      top: 68px;
      right: 16px;
      z-index: 25;
      width: min(312px, calc(100vw - 32px));
      max-height: calc(100vh - 128px);
      overflow: auto;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .detail-panel.hidden {
      display: none;
    }

    .status {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 25;
      max-width: min(780px, calc(100vw - 32px));
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.92);
      color: #e2e8f0;
      font-size: 13px;
      line-height: 1.5;
      box-shadow: var(--shadow);
      white-space: pre-wrap;
    }

    .reset-map-btn {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 30;
      min-width: 132px;
    }

    .btn,
    .search input,
    .field input,
    .field select {
      font: inherit;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--surface-strong);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .btn.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .btn.primary:hover {
      background: var(--accent-strong);
    }

    .search input {
      flex: 1;
      min-width: 0;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.05;
    }

    .sub {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .section {
      margin-top: 16px;
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
    }

    .card .label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .card .value {
      font-size: 20px;
      font-weight: 800;
    }

    .assignment-table {
      display: grid;
      gap: 8px;
    }

    .assignment-row {
      display: grid;
      grid-template-columns: 16px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.84);
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .assignment-row:hover {
      transform: translateY(-1px);
      border-color: rgba(59, 130, 246, 0.35);
    }

    .assignment-row.active {
      border-color: rgba(15, 23, 42, 0.55);
      background: rgba(239, 246, 255, 0.96);
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
    }

    .row-title {
      font-size: 13px;
      font-weight: 700;
    }

    .row-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.5;
    }

    .row-value {
      font-size: 14px;
      font-weight: 800;
    }

    .helper {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .detail-title {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.4;
      font-weight: 800;
    }

    .detail-line {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .detail-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 14px;
    }

    .detail-badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700;
    }

    .detail-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .detail-back-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 11px;
      background: rgba(239, 246, 255, 0.95);
      color: #1d4ed8;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-content: start;
      justify-items: stretch;
      gap: 10px;
    }

    .detail-row {
      display: grid;
      width: 100%;
      gap: 4px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.86);
    }

    .detail-row .k {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .detail-row .v {
      width: 100%;
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .zone-record-link {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: none;
      color: #0f172a;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
      cursor: pointer;
      text-align: left;
      white-space: normal;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .zone-record-meta {
      margin-top: 4px;
      color: #64748b;
      font-size: 12px;
      line-height: 1.55;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .map-side-controls {
      position: fixed;
      top: 16px;
      right: 116px;
      z-index: 31;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .zoom-btn {
      min-width: 42px;
      padding: 10px 0;
      text-align: center;
      font-size: 18px;
      line-height: 1;
    }

    @media (max-width: 1100px) {
      .detail-panel {
        display: none;
      }
    }

    @media (max-width: 900px) {
      .panel {
        width: calc(100vw - 24px);
        left: 12px;
        right: 12px;
        top: auto;
        bottom: 84px;
        max-height: 48vh;
      }

      .toolbar {
        top: 12px;
        left: 12px;
        right: 12px;
      }

      .search {
        top: auto;
        left: 12px;
        right: 12px;
        bottom: 22px;
        transform: none;
        width: auto;
      }

      .status {
        left: 12px;
        right: 12px;
        bottom: 84px;
        max-width: none;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .map-side-controls {
        top: 12px;
        right: 12px;
      }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="toolbar">
    <button id="toggle-panel" type="button" class="btn active">패널 ON</button>
    <button id="toggle-detail-panel" type="button" class="btn active">목록 ON</button>
    <button id="toggle-cadastral" type="button" class="btn active">지적도 ON</button>
    <button id="toggle-points" type="button" class="btn active">점 ON</button>
    <button id="fit-all" type="button" class="btn">전체 보기</button>
  </div>

  <div class="search">
    <input id="search-input" type="text" placeholder="주소 또는 지번 검색">
    <button id="search-btn" type="button" class="btn">검색</button>
  </div>

  <div class="map-side-controls">
    <button id="zoom-out-btn" type="button" class="btn zoom-btn">-</button>
    <button id="zoom-in-btn" type="button" class="btn zoom-btn">+</button>
  </div>

  <aside id="panel" class="panel">
    <h1>단독주택 안전점검 배정</h1>

    <div class="field-grid">
      <div class="field">
        <label for="center-select">서비스처리센터</label>
        <select id="center-select"></select>
      </div>
      <div class="field">
        <label for="month-select">월</label>
        <select id="month-select"></select>
      </div>
      <div class="field">
        <label for="people-input">인원</label>
        <input id="people-input" type="number" min="1" step="1" value="6">
      </div>
      <div class="field">
        <label for="target-output">인당 목표</label>
        <input id="target-output" type="text" value="-" readonly>
      </div>
    </div>

    <div class="action-row">
      <button id="assign-btn" type="button" class="btn primary">배정 실행</button>
      <button id="clear-btn" type="button" class="btn">하이라이트 초기화</button>
      <button id="export-btn" type="button" class="btn">엑셀 저장</button>
    </div>

    <div class="stats">
      <div class="card">
        <div class="label">주소 수</div>
        <div id="stat-addresses" class="value">-</div>
      </div>
      <div class="card">
        <div class="label">오더 수</div>
        <div id="stat-orders" class="value">-</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">배정 결과</div>
      <div id="assignment-table" class="assignment-table"></div>
    </div>
  </aside>

  <aside id="detail-panel" class="detail-panel">
    <div id="detail-title" class="section-title">선택 주소</div>
    <div id="detail-content" class="helper">점이나 검색 결과를 클릭하면 상세 정보가 표시됩니다.</div>
  </aside>

  <div id="status" class="status">초기화 중입니다.</div>

  <button id="reset-map" type="button" class="btn reset-map-btn">지도 초기화</button>

  <script>
    (function () {
      const log = console.log;
      console.log = function (...args) {
        log.apply(console, args);
        const el = document.getElementById("debug-pre");
        if (el) {
          el.innerText += args.join(" ") + "\n";
          el.scrollTop = el.scrollHeight;
        }
      };
    })();

    let APP = window.__SAFETY_ASSIGNMENT_APP__ || null;
    const NAVER_MAPS_KEY_ID = "4opvw9ym7h";
    const ZONE_COLORS = [
      "#2563eb", "#16a34a", "#ea580c", "#7c3aed", "#dc2626",
      "#0f766e", "#ca8a04", "#db2777", "#0891b2", "#4f46e5",
      "#65a30d", "#f97316", "#9333ea", "#059669", "#e11d48"
    ];

    const state = {
      map: null,
      cadastralLayer: null,
      panelVisible: true,
      detailPanelVisible: true,
      pointsVisible: true,
      currentScope: null,
      selectedZoneId: null,
      pointMarkers: [],
      pointMarkerMap: new Map(),
      assignmentLines: [],
      currentAssignments: [],
      currentRecordMap: new Map(),
      assignmentZoneMap: new Map(),
      zoneByRecordId: new Map(),
      searchRows: [],
      searchMarker: null,
      infoWindow: null,
      lastZoneDetailId: null
    };

    let naverSdkPromise = null;

    function setStatus(message, isError = false) {
      const el = document.getElementById("status");
      el.textContent = message;
      el.style.color = isError ? "#fecaca" : "#e2e8f0";
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("ko-KR").format(value || 0);
    }

    function updateStats(scope) {
      document.getElementById("stat-addresses").textContent = formatNumber(scope ? scope.total_addresses : 0);
      document.getElementById("stat-orders").textContent = formatNumber(scope ? scope.total_orders : 0);
      const peopleCount = Math.max(1, Number(document.getElementById("people-input").value) || 1);
      const target = scope ? scope.total_orders / Math.min(peopleCount, scope.blocks.length || 1) : 0;
      document.getElementById("target-output").value = scope ? `${formatNumber(Math.round(target))}건` : "-";
    }

    function formatSignedPercent(value) {
      const sign = value > 0 ? "+" : "";
      return `${sign}${value.toFixed(1)}%`;
    }

    function formatCounter(counter) {
      return Object.entries(counter || {})
        .map(([key, value]) => `${key} ${formatNumber(value)}`)
        .join(" / ") || "-";
    }

    function haversineM(lat1, lon1, lat2, lon2) {
      const toRad = (value) => value * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return 2 * 6371000 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function getScopeKey() {
      const center = document.getElementById("center-select").value;
      const month = document.getElementById("month-select").value;
      return `${month}|${center}`;
    }

    function getScope() {
      return APP.scopes[getScopeKey()] || null;
    }

    function syncMapSize() {
      const width = Math.max(window.innerWidth, document.documentElement.clientWidth || 0);
      const height = Math.max(window.innerHeight, document.documentElement.clientHeight || 0);
      state.map.setSize(new naver.maps.Size(width, height));
      naver.maps.Event.trigger(state.map, "resize");
    }

    function fitScope(scope) {
      if (!scope || !scope.records.length) {
        return;
      }
      const bounds = new naver.maps.LatLngBounds();
      for (const record of scope.records) {
        bounds.extend(new naver.maps.LatLng(record.lat, record.lon));
      }
      state.map.fitBounds(bounds, { top: 40, right: 40, bottom: 40, left: 40 });
    }


    function populateFilters() {
      const centerSelect = document.getElementById("center-select");
      const monthSelect = document.getElementById("month-select");

      centerSelect.innerHTML = APP.centers.map((center) => `<option value="${center}">${center}</option>`).join("");
      monthSelect.innerHTML = APP.months.map((month) => `<option value="${month}">${month}</option>`).join("");

      if (APP.centers.includes("H074")) {
        centerSelect.value = "H074";
      }
      if (APP.months.includes("2026.07")) {
        monthSelect.value = "2026.07";
      }
    }

    function pointIcon(color, scale = 3) {
      return {
        path: naver.maps.SymbolPath.CIRCLE,
        fillColor: color,
        fillOpacity: 0.6,
        strokeColor: "#ffffff",
        strokeWeight: 1.5,
        scale
      };
    }

    function getPointColor(record) {
      if (!state.currentAssignments.length) {
        return APP.scopes[record.scope_key].color || "#2563eb";
      }
      for (const zone of state.currentAssignments) {
        if (zone.addressIdsSet.has(record.id)) {
          return zone.color;
        }
      }
      return "#94a3b8";
    }

    function clearPointMarkers() {
      for (const marker of state.pointMarkers) {
        marker.setMap(null);
      }
      state.pointMarkers = [];
      state.pointMarkerMap = new Map();
    }

        function renderPointMarkers(scope) {
      clearPointMarkers();
      if (!scope) {
        return;
      }

      const token = state.markerRenderToken;
      const sourceRecords = scope.records || [];
      const records = state.searchFilterIds
        ? sourceRecords.filter((record) => state.searchFilterIds.has(record.id))
        : sourceRecords;
      if (!records.length || (!state.pointsVisible && !state.searchFilterIds)) {
        return;
      }
      const chunkSize = 320;
      let index = 0;

      function renderChunk() {
        if (token !== state.markerRenderToken) {
          return;
        }

        const bounds = state.map ? state.map.getBounds() : null;
        const end = Math.min(index + chunkSize, records.length);
        for (; index < end; index += 1) {
          const record = records[index];
          const inSearch = !state.searchFilterIds || state.searchFilterIds.has(record.id);
          const pos = new naver.maps.LatLng(record.lat, record.lon);
          const inBounds = bounds ? bounds.hasLatLng(pos) : true;
          const shouldShow = (state.pointsVisible || state.searchFilterIds) && inSearch && inBounds;

          const marker = new naver.maps.Marker({
            position: pos,
            map: shouldShow ? state.map : null,
            title: record.address,
            zIndex: 100,
            icon: pointIcon(getPointColor(record), 4)
          });
          marker.__record = record;
          naver.maps.Event.addListener(marker, "click", () => {
            selectRecord(record, true);
          });
          state.pointMarkers.push(marker);
          state.pointMarkerMap.set(record.id, marker);
        }

        if (index < records.length) {
          window.requestAnimationFrame(renderChunk);
        } else {
          updatePointMarkerStyles();
        }
      }

      renderChunk();
    }

    function updatePointMarkerStyles() {
      if (!state.map) return;
      const bounds = state.map.getBounds();
      const activeZoneId = state.selectedZoneId;
      const pointsVisible = state.pointsVisible;
      const searchFilterIds = state.searchFilterIds;

      for (let i = 0; i < state.pointMarkers.length; i++) {
        const marker = state.pointMarkers[i];
        const record = marker.__record;
        const inSearch = !searchFilterIds || searchFilterIds.has(record.id);
        const shouldShow = (pointsVisible || searchFilterIds) && inSearch && bounds.hasLatLng(marker.getPosition());

        if (shouldShow) {
          if (marker.getMap() !== state.map) {
            marker.setMap(state.map);
          }
          const zoneId = state.zoneByRecordId.get(record.id) || null;
          const zone = zoneId ? state.assignmentZoneMap.get(zoneId) : null;
          const assigned = Boolean(zone);
          const matched = activeZoneId ? zoneId === activeZoneId : false;
          const dimmed = activeZoneId ? !matched : false;
          const searchMatched = Boolean(searchFilterIds && searchFilterIds.has(record.id));
          const searchSelected = Boolean(searchMatched && state.selectedSearchRecordId === record.id);
          const assignmentColor = assigned ? zone.color : getPointColor(record);
          marker.setIcon({
            path: naver.maps.SymbolPath.CIRCLE,
            fillColor: searchSelected ? "#2563eb" : (searchMatched ? "#f59e0b" : assignmentColor),
            fillOpacity: dimmed && !searchMatched ? 0.14 : (assigned || searchMatched ? 0.9 : 0.72),
            strokeColor: searchSelected ? "#ffffff" : (searchMatched ? "#92400e" : (matched ? "#0f172a" : "#ffffff")),
            strokeWeight: searchSelected ? 3.2 : (searchMatched ? 2.6 : (matched ? 2.8 : (assigned ? 2.1 : 1.4))),
            scale: searchSelected ? 7.6 : (searchMatched ? 6.1 : (matched ? 7.0 : (assigned ? 5.6 : 4.2)))
          });
        } else {
          if (marker.getMap() !== null) {
            marker.setMap(null);
          }
        }
      }
    }

    function openDetailPanel(title, html) {
      const panel = document.getElementById("detail-panel");
      const titleEl = document.getElementById("detail-title");
      const contentEl = document.getElementById("detail-content");
      if (titleEl) {
        titleEl.textContent = title;
      }
      contentEl.innerHTML = html;
      state.detailPanelVisible = true;
      panel.classList.remove("hidden");
      const button = document.getElementById("toggle-detail-panel");
      if (button) {
        button.classList.add("active");
        button.textContent = "목록 ON";
      }
    }

    function clearAssignmentOverlays() {

    function convexHull(points) {
      if (points.length < 3) {
        return points.slice();
      }

      const sorted = points
        .map((point) => ({ x: point.lng, y: point.lat, lat: point.lat, lng: point.lng }))
        .sort((a, b) => (a.x === b.x ? a.y - b.y : a.x - b.x));

      const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
      const lower = [];
      for (const point of sorted) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], point) <= 0) {
          lower.pop();
        }
        lower.push(point);
      }

      const upper = [];
      for (let index = sorted.length - 1; index >= 0; index -= 1) {
        const point = sorted[index];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], point) <= 0) {
          upper.pop();
        }
        upper.push(point);
      }

      return lower.slice(0, -1).concat(upper.slice(0, -1)).map((point) => ({ lat: point.lat, lng: point.lng }));
    }

    function createZone(index, target, minTarget, maxTarget) {
      return {
        id: index + 1,
        color: ZONE_COLORS[index % ZONE_COLORS.length],
        target,
        minTarget,
        maxTarget,
        orders: 0,
        centroidLat: null,
        centroidLon: null,
        travelMeters: 0,
        maxStepMeters: 0,
        routeBand: "compact",
        blockCount: 0,
        addressCount: 0,
        addressIds: [],
        addressIdsSet: new Set(),
        records: []
      };
    }

    function cloneScopeRecords(scope) {
      return scope.records.map((record) => ({
        ...record,
        neighbors: (record.neighbors || []).map((item) => ({ ...item }))
      }));
    }

    function getNeighborEdge(left, right) {
      if (!left || !right) {
        return null;
      }
      const leftEdge = (left.neighbors || []).find((item) => item.id === right.id) || null;
      const rightEdge = (right.neighbors || []).find((item) => item.id === left.id) || null;
      if (leftEdge && rightEdge) {
        return leftEdge.score <= rightEdge.score ? leftEdge : rightEdge;
      }
      return leftEdge || rightEdge || null;
    }

    function getLotContinuityBonus(anchor, candidate) {
      if (!anchor || !candidate || !anchor.dong || anchor.dong !== candidate.dong) {
        return 0;
      }

      let bonus = 0;
      if (anchor.road_stem && candidate.road_stem && anchor.road_stem === candidate.road_stem) {
        bonus += 32;
      }
      if (anchor.block_id && candidate.block_id && anchor.block_id === candidate.block_id) {
        bonus += 64;
      }

      if (Number.isFinite(anchor.lot_main) && Number.isFinite(candidate.lot_main)) {
        const mainGap = Math.abs(anchor.lot_main - candidate.lot_main);
        if (mainGap === 0) {
          bonus += 54;
          if (Number.isFinite(anchor.lot_sub) && Number.isFinite(candidate.lot_sub)) {
            const subGap = Math.abs(anchor.lot_sub - candidate.lot_sub);
            if (subGap === 0) {
              bonus += 22;
            } else if (subGap === 1) {
              bonus += 16;
            } else if (subGap <= 3) {
              bonus += 10;
            } else if (subGap <= 6) {
              bonus += 4;
            } else {
              bonus -= Math.min(18, subGap * 1.2);
            }
          }
        } else if (mainGap === 1) {
          bonus += 28;
        } else if (mainGap === 2) {
          bonus += 14;
        } else if (mainGap <= 5) {
          bonus += 4;
        } else {
          bonus -= Math.min(26, mainGap * 1.4);
        }
      }

      return bonus;
    }

    function getMinDistanceToZone(zone, candidate) {
      if (!zone.records.length) {
        return 0;
      }
      let minDistance = Infinity;
      for (const record of zone.records) {
        const distance = haversineM(record.lat, record.lon, candidate.lat, candidate.lon);
        if (distance < minDistance) {
          minDistance = distance;
        }
      }
      return Number.isFinite(minDistance) ? minDistance : 0;
    }

    function isLocalCandidate(zone, candidate, anchor, edge, minDistance, lastDistance) {
      if (!anchor) {
        return true;
      }

      const sameDong = anchor.dong && candidate.dong && anchor.dong === candidate.dong;
      const sameRoad = anchor.road_stem && candidate.road_stem && anchor.road_stem === candidate.road_stem;
      const sameBlock = anchor.block_id && candidate.block_id && anchor.block_id === candidate.block_id;
      const lotBonus = getLotContinuityBonus(anchor, candidate);
      const edgeScore = edge ? edge.score : Infinity;

      return Boolean(
        sameBlock ||
        (sameDong && sameRoad) ||
        lotBonus >= 38 ||
        lastDistance <= 120 ||
        minDistance <= 90 ||
        edgeScore <= 135
      );
    }

    function evaluateRecordCandidate(zone, candidate, target, maxTarget, phase, allowOverflow = false) {
      const anchor = zone.records[zone.records.length - 1] || null;
      const lastDistance = anchor ? haversineM(anchor.lat, anchor.lon, candidate.lat, candidate.lon) : 0;
      const minDistance = getMinDistanceToZone(zone, candidate);
      const edge = anchor ? getNeighborEdge(anchor, candidate) : null;
      const continuityBonus = getLotContinuityBonus(anchor, candidate);
      const nextOrders = zone.orders + candidate.orders;
      const overflow = Math.max(0, nextOrders - maxTarget);
      const fit = allowOverflow || overflow <= 0;
      const local = isLocalCandidate(zone, candidate, anchor, edge, minDistance, lastDistance);
      const edgePenalty = edge ? edge.score * 0.85 : 170;
      const jumpPenalty = lastDistance > 130 ? (lastDistance - 130) * 0.82 : 0;
      const spreadPenalty = minDistance > 95 ? (minDistance - 95) * 0.34 : 0;
      const fillGapAfter = Math.max(0, target - nextOrders);
      const fillBonus = Math.min(candidate.orders, Math.max(0, target - zone.orders)) * 6.5;
      const localBonus = local ? 40 : 0;
      const phasePenalty = phase === "target" ? fillGapAfter * 0.9 : 0;
      const overflowPenalty = fit ? 0 : 1000000 + overflow * 10000;

      const cost =
        lastDistance * 0.92 +
        minDistance * 0.24 +
        edgePenalty +
        jumpPenalty +
        spreadPenalty +
        phasePenalty +
        overflowPenalty -
        continuityBonus -
        fillBonus -
        localBonus;

      return {
        candidate,
        cost,
        fit,
        local,
        lastDistance,
        minDistance,
        nextOrders
      };
    }

    function refreshZoneMetrics(zone) {
      const records = zone.records;
      zone.orders = records.reduce((sum, record) => sum + record.orders, 0);
      zone.addressIds = records.map((record) => record.id);
      zone.addressIdsSet = new Set(zone.addressIds);
      zone.addressCount = records.length;
      zone.blockCount = new Set(records.map((record) => record.block_id).filter(Boolean)).size;

      if (!records.length) {
        zone.centroidLat = null;
        zone.centroidLon = null;
        zone.travelMeters = 0;
        zone.maxStepMeters = 0;
        zone.routeBand = "compact";
        zone.deviationPct = 0;
        return;
      }

      const weightedOrders = Math.max(1, zone.orders);
      zone.centroidLat = records.reduce((sum, record) => sum + record.lat * record.orders, 0) / weightedOrders;
      zone.centroidLon = records.reduce((sum, record) => sum + record.lon * record.orders, 0) / weightedOrders;

      let travelMeters = 0;
      let maxStepMeters = 0;
      for (let index = 1; index < records.length; index += 1) {
        const prev = records[index - 1];
        const current = records[index];
        const step = haversineM(prev.lat, prev.lon, current.lat, current.lon);
        travelMeters += step;
        maxStepMeters = Math.max(maxStepMeters, step);
      }
      zone.travelMeters = travelMeters;
      zone.maxStepMeters = maxStepMeters;
      zone.routeBand = maxStepMeters <= 90 ? "compact" : maxStepMeters <= 180 ? "balanced" : "wide";
      zone.deviationPct = zone.target ? ((zone.orders - zone.target) / zone.target) * 100 : 0;
    }

    function addRecordToZone(zone, record, remaining) {
      zone.records.push(record);
      remaining.delete(record.id);
      refreshZoneMetrics(zone);
    }

    function pickSeedRecord(remaining, recordMap) {
      let best = null;
      let bestScore = -Infinity;

      for (const record of remaining.values()) {
        let densityScore = record.orders * 38;
        for (const edge of record.neighbors || []) {
          const neighbor = remaining.get(edge.id) || recordMap.get(edge.id);
          if (!neighbor || !remaining.has(neighbor.id)) {
            continue;
          }
          densityScore += Math.max(0, 180 - edge.score);
          densityScore += neighbor.orders * 14;
          if (record.dong && neighbor.dong && record.dong === neighbor.dong) {
            densityScore += 10;
          }
          if (record.road_stem && neighbor.road_stem && record.road_stem === neighbor.road_stem) {
            densityScore += 8;
          }
        }

        if (densityScore > bestScore) {
          bestScore = densityScore;
          best = record;
        }
      }

      return best || Array.from(remaining.values())[0] || null;
    }

    function chooseNextRecord(zone, remaining, target, maxTarget, phase, allowOverflow = false) {
      const evaluated = [];
      for (const candidate of remaining.values()) {
        evaluated.push(evaluateRecordCandidate(zone, candidate, target, maxTarget, phase, allowOverflow));
      }

      const fitting = evaluated.filter((item) => item.fit);
      if (!fitting.length && !allowOverflow) {
        return null;
      }

      const source = fitting.length ? fitting : evaluated;
      const local = source.filter((item) => item.local);

      if (phase === "fill") {
        if (!local.length) {
          return null;
        }
        local.sort((a, b) => a.cost - b.cost || a.lastDistance - b.lastDistance || a.candidate.orders - b.candidate.orders);
        return local[0].candidate;
      }

      if (local.length) {
        local.sort((a, b) => a.cost - b.cost || a.lastDistance - b.lastDistance || a.candidate.orders - b.candidate.orders);
        return local[0].candidate;
      }

      source.sort((a, b) => a.cost - b.cost || a.lastDistance - b.lastDistance || a.candidate.orders - b.candidate.orders);
      return source[0] ? source[0].candidate : null;
    }

    function compareSequentialRecords(left, right) {
      const leftDong = left.dong || "";
      const rightDong = right.dong || "";
      if (leftDong !== rightDong) {
        return leftDong.localeCompare(rightDong, "ko");
      }

      const leftRoad = left.road_stem || "";
      const rightRoad = right.road_stem || "";
      if (leftRoad !== rightRoad) {
        return leftRoad.localeCompare(rightRoad, "ko");
      }

      const leftMain = Number.isFinite(left.lot_main) ? left.lot_main : Number.POSITIVE_INFINITY;
      const rightMain = Number.isFinite(right.lot_main) ? right.lot_main : Number.POSITIVE_INFINITY;
      if (leftMain !== rightMain) {
        return leftMain - rightMain;
      }

      const leftSub = Number.isFinite(left.lot_sub) ? left.lot_sub : -1;
      const rightSub = Number.isFinite(right.lot_sub) ? right.lot_sub : -1;
      if (leftSub !== rightSub) {
        return leftSub - rightSub;
      }

      return (left.address || "").localeCompare(right.address || "", "ko");
    }

    function computeBlockSurfaceScore(block, centroidLat, centroidLon) {
      const degree = (block.neighbors || []).length;
      const radius = haversineM(centroidLat, centroidLon, block.centroid[0], block.centroid[1]);
      return radius + Math.max(0, 6 - degree) * 42;
    }

    function chooseSurfaceStartBlock(blocks, centroidLat, centroidLon) {
      return blocks
        .slice()
        .sort((a, b) =>
          computeBlockSurfaceScore(b, centroidLat, centroidLon) - computeBlockSurfaceScore(a, centroidLat, centroidLon) ||
          a.centroid[1] - b.centroid[1] ||
          a.centroid[0] - b.centroid[0]
        )[0] || null;
    }

    function chooseNextTraversalBlock(current, unvisited, blockMap, centroidLat, centroidLon) {
      const candidates = [];
      if (current) {
        for (const edge of current.neighbors || []) {
          if (unvisited.has(edge.id)) {
            const candidate = blockMap.get(edge.id);
            if (candidate) {
              candidates.push(candidate);
            }
          }
        }
      }

      const source = candidates.length ? candidates : Array.from(unvisited.values());
      if (!source.length) {
        return null;
      }

      let best = null;
      let bestCost = Infinity;
      for (const block of source) {
        const degree = (block.neighbors || []).length;
        const radius = haversineM(centroidLat, centroidLon, block.centroid[0], block.centroid[1]);
        const distance = current
          ? haversineM(current.centroid[0], current.centroid[1], block.centroid[0], block.centroid[1])
          : radius;
        const edge = current ? (current.neighbors || []).find((item) => item.id === block.id) : null;
        const edgePenalty = edge ? edge.score * 0.75 : 180;
        const sameDongBonus = current && current.dongs && block.dongs
          ? current.dongs.some((dong) => block.dongs.includes(dong)) ? 22 : 0
          : 0;
        const sameStreetBonus = current && current.street_stems && block.street_stems
          ? current.street_stems.some((street) => block.street_stems.includes(street)) ? 18 : 0
          : 0;
        const surfaceBonus = Math.max(0, 6 - degree) * 28 + radius * 0.12;
        const adjacentBonus = edge ? 120 : 0;
        const cost = distance + edgePenalty - surfaceBonus - sameDongBonus - sameStreetBonus - adjacentBonus;
        if (cost < bestCost) {
          bestCost = cost;
          best = block;
        }
      }

      return best;
    }

    function buildBlockTraversal(blocks) {
      if (!blocks.length) {
        return [];
      }

      const totalOrders = blocks.reduce((sum, block) => sum + block.orders, 0) || 1;
      const centroidLat = blocks.reduce((sum, block) => sum + block.centroid[0] * block.orders, 0) / totalOrders;
      const centroidLon = blocks.reduce((sum, block) => sum + block.centroid[1] * block.orders, 0) / totalOrders;
      const blockMap = new Map(blocks.map((block) => [block.id, block]));
      const unvisited = new Map(blocks.map((block) => [block.id, block]));
      const route = [];

      let current = chooseSurfaceStartBlock(blocks, centroidLat, centroidLon);
      while (unvisited.size) {
        if (!current || !unvisited.has(current.id)) {
          current = chooseSurfaceStartBlock(Array.from(unvisited.values()), centroidLat, centroidLon);
        }
        if (!current) {
          break;
        }

        route.push(current);
        unvisited.delete(current.id);
        current = chooseNextTraversalBlock(current, unvisited, blockMap, centroidLat, centroidLon);
      }

      return route;
    }

    function buildRecordTraversal(scopeRecords, scopeBlocks) {
      const recordMap = new Map(scopeRecords.map((record) => [record.id, record]));
      const recordsByBlock = new Map();
      for (const record of scopeRecords) {
        if (!recordsByBlock.has(record.block_id)) {
          recordsByBlock.set(record.block_id, []);
        }
        recordsByBlock.get(record.block_id).push(record);
      }

      for (const records of recordsByBlock.values()) {
        records.sort(compareSequentialRecords);
      }

      const orderedRecords = [];
      const used = new Set();
      for (const block of buildBlockTraversal(scopeBlocks)) {
        const items = recordsByBlock.get(block.id) || [];
        for (const record of items) {
          orderedRecords.push(record);
          used.add(record.id);
        }
      }

      const leftovers = scopeRecords
        .filter((record) => !used.has(record.id))
        .sort(compareSequentialRecords);
      for (const record of leftovers) {
        orderedRecords.push(record);
      }

      return orderedRecords.map((record) => recordMap.get(record.id) || record);
    }

    function pushRecordSequential(zone, record) {
      zone.records.push(record);
      refreshZoneMetrics(zone);
    }

    function getSequentialStepMeters(prev, next) {
      if (!prev || !next) {
        return 0;
      }
      return haversineM(prev.lat, prev.lon, next.lat, next.lon);
    }

    function getRouteDifficulty(zone) {
      if (!zone.records.length || zone.records.length < 2) {
        return 0;
      }
      const jump = zone.maxStepMeters;
      const n = zone.records.length;
      const avg = zone.travelMeters / Math.max(1, n - 1);
      const jc = Math.min(1.0, Math.max(0, (jump - 250) / 750));
      const ac = Math.min(1.0, Math.max(0, (avg - 50) / 200));
      return jc * 0.7 + ac * 0.3;
    }

    function getDifficultyFactor(d) {
      const f = 1.10 - d * 0.20;
      return Math.max(0.90, Math.min(1.10, f));
    }

    function getZoneDynamicBounds(zone, target, baseMinTarget, baseMaxTarget, nextRecord = null, remainingOrders = 0, remainingZones = 0) {
      const last = zone.records[zone.records.length - 1] || null;
      const nextStep = getSequentialStepMeters(last, nextRecord);
      const blockChange = Boolean(last && nextRecord && last.block_id !== nextRecord.block_id);

      const d = getRouteDifficulty(zone);
      const factor = getDifficultyFactor(d);
      let maxTarget = target * factor;
      let minTarget = target * 0.90;

      if (remainingZones > 0 && remainingOrders > 0) {
        const avgRemaining = remainingOrders / remainingZones;
        const budgetPressure = Math.max(0, avgRemaining - target) / target;
        if (budgetPressure > 0.05) {
          const blend = Math.min(1.0, budgetPressure / 0.10);
          maxTarget = maxTarget + (baseMaxTarget - maxTarget) * blend;
        }
      }

      maxTarget = Math.max(maxTarget, minTarget);
      return { minTarget, maxTarget, nextStep, blockChange };
    }

    function shouldStopSequentialZone(zone, nextRecord, target, baseMinTarget, baseMaxTarget, remainingOrders, remainingZones) {
      if (!nextRecord || !zone.records.length) {
        return true;
      }

      const bounds = getZoneDynamicBounds(zone, target, baseMinTarget, baseMaxTarget, nextRecord, remainingOrders || 0, remainingZones || 0);
      const nextOrders = zone.orders + nextRecord.orders;
      const closeEnough = zone.orders >= bounds.minTarget;

      if (zone.orders >= bounds.maxTarget) {
        return true;
      }

      if (closeEnough && nextOrders > bounds.maxTarget) {
        return true;
      }

      if (closeEnough && bounds.blockChange && bounds.nextStep > 800) {
        return true;
      }

      if (closeEnough && bounds.blockChange && bounds.nextStep >= 180) {
        return true;
      }

      if (closeEnough && bounds.blockChange && bounds.nextStep >= 120 && zone.maxStepMeters > 90) {
        return true;
      }

      return false;
    }

    function buildBlockComponents(blocks) {
      const blockMap = new Map(blocks.map((block) => [block.id, block]));
      const seen = new Set();
      const components = [];

      for (const block of blocks) {
        if (seen.has(block.id)) {
          continue;
        }

        const queue = [block.id];
        seen.add(block.id);
        const ids = [];
        let orders = 0;

        while (queue.length) {
          const currentId = queue.shift();
          const current = blockMap.get(currentId);
          if (!current) {
            continue;
          }
          ids.push(currentId);
          orders += current.orders;
          for (const edge of current.neighbors || []) {
            if (!seen.has(edge.id) && blockMap.has(edge.id)) {
              seen.add(edge.id);
              queue.push(edge.id);
            }
          }
        }

        components.push({
          blockIds: ids,
          orders,
          blocks: ids.map((id) => blockMap.get(id)).filter(Boolean)
        });
      }

      for (const component of components) {
        const totalOrders = component.blocks.reduce((sum, block) => sum + block.orders, 0) || 1;
        component.centroid = [
          component.blocks.reduce((sum, block) => sum + block.centroid[0] * block.orders, 0) / totalOrders,
          component.blocks.reduce((sum, block) => sum + block.centroid[1] * block.orders, 0) / totalOrders,
        ];
      }

      components.sort((a, b) => b.orders - a.orders);
      return components;
    }

    function allocateZoneCountsToComponents(components, zoneCount, globalTarget) {
      if (!components.length) {
        return [];
      }

      const allocations = components.map((component) => ({
        component,
        count: 0,
        desired: component.orders / Math.max(1, globalTarget)
      }));

      for (const item of allocations) {
        item.count = Math.floor(item.desired);
        item.maxReasonable = Math.max(1, Math.floor(item.component.orders / Math.max(1, globalTarget * 0.9)));
      }

      let assigned = allocations.reduce((sum, item) => sum + item.count, 0);

      while (assigned > zoneCount) {
        allocations
          .filter((item) => item.count > 0)
          .sort((a, b) => ((a.count - a.desired) - (b.count - b.desired)) || (a.component.orders - b.component.orders))[0]
          .count -= 1;
        assigned -= 1;
      }

      while (assigned < zoneCount) {
        allocations
          .slice()
          .sort((a, b) => {
            const aScore = (a.desired - a.count) + (a.count < a.maxReasonable ? 0.35 : -0.5);
            const bScore = (b.desired - b.count) + (b.count < b.maxReasonable ? 0.35 : -0.5);
            return bScore - aScore || b.component.orders - a.component.orders;
          })[0]
          .count += 1;
        assigned += 1;
      }

      return allocations;
    }

    function splitOrderedRecordsIntoZones(orderedRecords, startZoneIndex, zoneCount, globalTarget) {
      const zones = [];
      let cursor = 0;
      let remainingOrders = orderedRecords.reduce((sum, record) => sum + record.orders, 0);
      const baseMinTarget = globalTarget * 0.90;
      const baseMaxTarget = globalTarget * 1.1;

      for (let localIndex = 0; localIndex < zoneCount; localIndex += 1) {
        const remainingZoneCount = zoneCount - localIndex;
        const remainingZonesAfter = remainingZoneCount - 1;
        const zone = createZone(startZoneIndex + localIndex, globalTarget, baseMinTarget, baseMaxTarget);

        if (localIndex === zoneCount - 1) {
          while (cursor < orderedRecords.length) {
            pushRecordSequential(zone, orderedRecords[cursor]);
            cursor += 1;
          }
          refreshZoneMetrics(zone);
          zones.push(zone);
          remainingOrders -= zone.orders;
          continue;
        }

        while (cursor < orderedRecords.length) {
          const record = orderedRecords[cursor];
          const reserveAfterTake = remainingZonesAfter * baseMinTarget;
          const maxRoomAfterTake = remainingZonesAfter * baseMaxTarget;
          const remainingAfterTake = remainingOrders - record.orders;
          const mustKeepTaking = zone.orders < baseMinTarget;
          const mustKeepTakingForRest = remainingZonesAfter > 0 && remainingAfterTake > maxRoomAfterTake;
          const canSpareForRest = remainingAfterTake >= reserveAfterTake;

          if (
            zone.records.length &&
            !mustKeepTaking &&
            !mustKeepTakingForRest &&
            canSpareForRest &&
            shouldStopSequentialZone(zone, record, globalTarget, baseMinTarget, baseMaxTarget, remainingOrders, remainingZonesAfter)
          ) {
            break;
          }

          pushRecordSequential(zone, record);
          cursor += 1;
          remainingOrders -= record.orders;

          if (
            zone.orders >= baseMinTarget &&
            remainingZonesAfter > 0 &&
            remainingOrders >= reserveAfterTake &&
            remainingOrders <= maxRoomAfterTake
          ) {
            break;
          }
        }

        if (!zone.records.length && cursor < orderedRecords.length) {
          pushRecordSequential(zone, orderedRecords[cursor]);
          remainingOrders -= orderedRecords[cursor].orders;
          cursor += 1;
        }

        refreshZoneMetrics(zone);
        zones.push(zone);
      }

      return zones;
    }

    function getAssignmentPenalty(zone) {
      const hardMin = zone.target * 0.90;
      const hardMax = zone.target * 1.10;
      const under = Math.max(0, hardMin - zone.orders);
      const over = Math.max(0, zone.orders - hardMax);
      const d = getRouteDifficulty(zone);
      const dynTarget = zone.target * getDifficultyFactor(d);
      return under * 30 + over * 30 + Math.abs(zone.orders - dynTarget) * 1.5 + Math.max(0, zone.maxStepMeters - 500) * 0.15;
    }

    function summarizeAssignmentPenalty(zones) {
      return zones.reduce((sum, zone) => sum + getAssignmentPenalty(zone), 0);
    }

    function rebalanceSequentialZones(zones, globalTarget) {
      if (zones.length <= 1) {
        return zones;
      }

      let working = zones.map((zone, index) => {
        const clone = createZone(index, globalTarget, globalTarget * 0.90, globalTarget * 1.1);
        clone.records = zone.records.slice();
        refreshZoneMetrics(clone);
        return clone;
      });

      for (let pass = 0; pass < 12; pass += 1) {
        let changed = false;

        for (let center = 0; center < working.length; center += 1) {
          const zone = working[center];
          const d = getRouteDifficulty(zone);
          const dm = globalTarget * getDifficultyFactor(d);
          if (zone.orders >= globalTarget * 0.90 && zone.orders <= dm * 1.02) {
            continue;
          }

          const start = Math.max(0, center - 1);
          const end = Math.min(working.length - 1, center + 1);
          const originalWindow = working.slice(start, end + 1);
          const originalPenalty = summarizeAssignmentPenalty(originalWindow);
          const windowRecords = originalWindow.flatMap((item) => item.records);
          const candidateWindow = splitOrderedRecordsIntoZones(windowRecords, start, originalWindow.length, globalTarget);
          const candidatePenalty = summarizeAssignmentPenalty(candidateWindow);

          if (candidatePenalty + 0.5 < originalPenalty) {
            working.splice(start, originalWindow.length, ...candidateWindow);
            changed = true;
          }
        }

        if (!changed) {
          break;
        }
      }

      return working.map((zone, index) => {
        zone.id = index + 1;
        zone.color = ZONE_COLORS[index % ZONE_COLORS.length];
        refreshZoneMetrics(zone);
        return zone;
      });
    }

    function legacyDisabledAssignmentParser(scope, peopleCount) {
      const records = cloneScopeRecords(scope);
      if (!records.length) {
        return [];
      }

      const zoneCount = Math.max(1, Number(peopleCount) || 1);
      const target = scope.total_orders / zoneCount;
      const blockMap = new Map((scope.blocks || []).map(b => [b.id, b]));
      const recordsByBlock = buildRecordsByBlock(records);

      const islandBlocksIds = new Set();
      const nonIslandBlocks = [];
      const islandBlocks = [];
      const islandThresholdM = 220.0;

      for (const block of scope.blocks || []) {
        const neighbors = block.neighbors || [];
        let isIsolated = false;
        if (neighbors.length === 0) {
          isIsolated = true;
        } else {
          const minDist = Math.min(...neighbors.map(n => n.distance_m));
          if (minDist > islandThresholdM) {
            isIsolated = true;
          }
        }

        if (isIsolated) {
          islandBlocksIds.add(block.id);
          islandBlocks.push(block);
        } else {
          nonIslandBlocks.push(block);
        }
      }

      const nonIslandRecords = records.filter(r => !islandBlocksIds.has(r.block_id));
      const islandRecords = records.filter(r => islandBlocksIds.has(r.block_id));

      const orderedRecords = buildRecordTraversal(nonIslandRecords, nonIslandBlocks);
      let zones = splitOrderedRecordsIntoZones(orderedRecords, 0, zoneCount, target);
      zones = rebalanceSequentialZones(zones, target);

      while (zones.length < zoneCount) {
        const zone = createZone(zones.length, target, target * 0.9, target * 1.1);
        refreshZoneMetrics(zone);
        zones.push(zone);
      }

      for (const z of zones) {
        refreshZoneMetrics(z);
      }

      const islandRecordsByBlock = new Map();
      for (const r of islandRecords) {
        if (!islandRecordsByBlock.has(r.block_id)) {
          islandRecordsByBlock.set(r.block_id, []);
        }
        islandRecordsByBlock.get(r.block_id).push(r);
      }

      for (const [blockId, recs] of islandRecordsByBlock.entries()) {
        const block = islandBlocks.find(b => b.id === blockId);
        if (!block) continue;
        const bLat = block.centroid[0];
        const bLon = block.centroid[1];

        let bestZone = null;
        let minD = Infinity;

        for (const z of zones) {
          if (!z.records || z.records.length === 0) continue;

          let dist = Infinity;
          for (const r of z.records) {
            const d = haversineM(bLat, bLon, r.lat, r.lon);
            if (d < dist) {
              dist = d;
            }
          }

          const blockOrders = recs.reduce((sum, r) => sum + r.orders, 0);
          const projectedOrders = z.orders + blockOrders;
          const projectedJump = Math.max(z.maxStepMeters || 0, dist);
          const preferredTarget = target * getJumpOrderFactor(projectedJump);
          const overflow = Math.max(0, projectedOrders - target * 1.1);
          const shortage = Math.max(0, target * 0.9 - projectedOrders);
          const effectiveDist =
            dist +
            overflow * 260 +
            shortage * 4 +
            Math.abs(projectedOrders - preferredTarget) * 2.5;

          if (effectiveDist < minD) {
            minD = effectiveDist;
            bestZone = z;
          }
        }

        if (!bestZone) {
          bestZone = zones[0];
        }

        bestZone.records.push(...recs);
        refreshZoneMetrics(bestZone);
      }

      for (const z of zones) {
        if (!z.records || z.records.length === 0) continue;

        const zoneBlockIds = new Set(z.records.map(r => r.block_id).filter(Boolean));
        const zoneBlocks = Array.from(zoneBlockIds).map(id => blockMap.get(id)).filter(Boolean);
        const zoneBlockRoute = buildBlockTraversal(zoneBlocks);
        const zoneRecsByBlock = new Map();
        for (const r of z.records) {
          if (!zoneRecsByBlock.has(r.block_id)) {
            zoneRecsByBlock.set(r.block_id, []);
          }
          zoneRecsByBlock.get(r.block_id).push(r);
        }

        for (const [blockId, recs] of zoneRecsByBlock.entries()) {
          recs.sort(compareSequentialRecords);
        }

        const orderedZoneRecords = [];
        for (const block of zoneBlockRoute) {
          const recs = zoneRecsByBlock.get(block.id);
          if (recs) {
            orderedZoneRecords.push(...recs);
          }
        }

        const fallbackRecs = [];
        for (const [blockId, recs] of zoneRecsByBlock.entries()) {
          const inRoute = zoneBlockRoute.some(b => b.id === blockId);
          if (!inRoute) {
            fallbackRecs.push(...recs);
          }
        }
        orderedZoneRecords.push(...fallbackRecs);
        z.records = orderedZoneRecords;
        refreshZoneMetrics(z);
      }

      return zones.sort((a, b) => a.id - b.id);
    }

    function renderAssignmentTable(assignments) {
      const table = document.getElementById("assignment-table");
      if (!assignments.length) {
        table.innerHTML = `<div class="helper">인원을 입력하고 배정 실행을 누르면 배정 결과가 표시됩니다.</div>`;
        return;
      }

      table.innerHTML = assignments.map((item) => `
        <div class="assignment-row ${state.selectedZoneId === item.id ? "active" : ""}" data-zone-id="${item.id}">
          <div class="swatch" style="background:${item.color}"></div>
          <div>
            <div class="row-title">인원 ${item.id}</div>
            <div class="row-sub">주소 ${formatNumber(item.addressCount)} / 블럭 ${formatNumber(item.blockCount)} / 동선 ${Math.round(item.travelMeters)}m / 최대점프 ${Math.round(item.maxStepMeters)}m / ${item.routeBand}</div>
            <div class="row-sub">허용 ${formatNumber(Math.floor(item.minTarget))}~${formatNumber(Math.ceil(item.maxTarget))}건 / 편차 ${formatSignedPercent(item.deviationPct)}</div>
          </div>
          <div class="row-value">${formatNumber(item.orders)}건</div>
        </div>
      `).join("");

      Array.from(table.querySelectorAll(".assignment-row")).forEach((row) => {
        row.addEventListener("click", () => {
          const zoneId = Number(row.dataset.zoneId);
          state.selectedZoneId = state.selectedZoneId === zoneId ? null : zoneId;
          updateAssignmentVisibility();
          renderAssignmentTable(state.currentAssignments);
          const zone = state.currentAssignments.find((item) => item.id === zoneId);
          if (zone && state.selectedZoneId === zoneId) {
            openZoneDetailPanel(zone);
            focusZone(zone);
          }
        });
      });
    }

    function updateAssignmentVisibility() {
      for (const line of state.assignmentLines) {
        const active = !state.selectedZoneId || line.__zoneId === state.selectedZoneId;
        line.setOptions({
          strokeOpacity: active ? (state.selectedZoneId ? 0.7 : 0.15) : 0.04,
          strokeWeight: active ? (state.selectedZoneId ? 2.2 : 1.0) : 0.8
        });
      }
      updatePointMarkerStyles();
    }

    function drawAssignments(scope, assignments) {
      clearAssignmentOverlays();
      state.currentRecordMap = new Map(scope.records.map((record) => [record.id, record]));
      state.assignmentZoneMap = new Map(assignments.map((zone) => [zone.id, zone]));
      state.zoneByRecordId = new Map();
      for (const zone of assignments) {
        for (const record of zone.records) {
          state.zoneByRecordId.set(record.id, zone.id);
        }
      }

      for (const zone of assignments) {
        const path = zone.records.map((record) => new naver.maps.LatLng(record.lat, record.lon));
        if (path.length >= 2) {
          const polyline = new naver.maps.Polyline({
            map: state.map,
            path,
            strokeColor: zone.color,
            strokeOpacity: 0.15,
            strokeWeight: 1.0,
            strokeStyle: "shortdash"
          });
          polyline.__zoneId = zone.id;
          state.assignmentLines.push(polyline);
        }
      }

      state.currentAssignments = assignments;
      state.selectedZoneId = null;
      renderAssignmentTable(assignments);
      updateAssignmentVisibility();
    }

    function runAssignment() {
      const scope = getScope();
      if (!scope) {
        setStatus("선택한 센터/월 데이터가 없습니다.", true);
        return;
      }

      const peopleCount = Number(document.getElementById("people-input").value);
      if (!Number.isInteger(peopleCount) || peopleCount < 1) {
        setStatus("인원은 1 이상의 정수로 입력하세요.", true);
        return;
      }

      const assignments = parseAssignments(scope, peopleCount);
      drawAssignments(scope, assignments);

      const target = scope.total_orders / Math.max(1, peopleCount);
      const minTarget = target * 0.90;
      const maxTarget = target * 1.1;
      const satisfied = assignments.filter((item) => item.orders >= minTarget && item.orders <= maxTarget).length;

      setStatus(
        `배정 완료: ${scope.center} / ${scope.month} / 총 오더 ${formatNumber(scope.total_orders)}건 / 인원 ${formatNumber(peopleCount)}명 / 기준 ${formatNumber(Math.round(target))}건 / 기본 허용 ${formatNumber(Math.floor(minTarget))}~${formatNumber(Math.ceil(maxTarget))}건 / 만족 ${satisfied}/${assignments.length}`
      );
    }

    function runSearch() {
      const scope = getScope();
      const keyword = document.getElementById("search-input").value.trim().toLowerCase();
      if (!scope || !keyword) {
        setStatus("검색어를 입력하세요.", true);
        return;
      }

      const matched = state.searchRows.find((item) => item.text.includes(keyword));
      const record = matched ? matched.record : null;

      if (!record) {
        setStatus(`검색 결과 없음: ${keyword}`, true);
        return;
      }

      if (state.searchMarker) {
        state.searchMarker.setMap(null);
      }

      state.searchMarker = new naver.maps.Marker({
        map: state.map,
        position: new naver.maps.LatLng(record.lat, record.lon),
        zIndex: 1200,
        icon: pointIcon("#111827", 8)
      });

      selectRecord(record, true);
      state.map.setZoom(17, true);
      setStatus(`검색 완료: ${record.address} / 오더 ${formatNumber(record.orders)} / 좌표 ${record.coord_source}`);
    }


    function updateScopeView() {
      const scope = getScope();
      state.currentScope = scope;
      state.currentRecordMap = new Map((scope?.records || []).map((record) => [record.id, record]));
      state.searchRows = (scope?.records || []).map((record) => ({
        record,
        text: [
          record.address,
          record.jibun_address,
          record.road_address,
          record.query_used
        ].map((value) => String(value || "").toLowerCase()).join(" ")
      }));
      clearAssignmentOverlays();

      if (state.searchMarker) {
        state.searchMarker.setMap(null);

      }

      updateStats(scope);
      renderPointMarkers(scope);
      renderAssignmentTable([]);
      showDefaultDetailPanel();

      if (scope) {
        fitScope(scope);
        setStatus(`범위 변경: ${scope.center} / ${scope.month} / 주소 ${formatNumber(scope.total_addresses)}건 / 오더 ${formatNumber(scope.total_orders)}건 / 좌표 우선순위 ${APP.coord_priority.join(" > ")}`);
      } else {
        setStatus("선택한 범위의 데이터가 없습니다.", true);
      }
    }

    function enforceUniqueRecordAssignments(zones, allRecords, globalTarget) {
      if (!Array.isArray(zones) || !zones.length) {
        return zones;
      }

      zones.forEach(refreshZoneMetrics);
      const minTarget = globalTarget * 0.9;
      const maxTarget = globalTarget * 1.1;
      const occurrencesById = new Map();

      for (const zone of zones) {
        for (const record of zone.records || []) {
          if (!record || !record.id) {
            continue;
          }
          if (!occurrencesById.has(record.id)) {
            occurrencesById.set(record.id, []);
          }
          occurrencesById.get(record.id).push({ zone, record });
        }
      }

      let duplicateCount = 0;
      for (const [recordId, occurrences] of occurrencesById.entries()) {
        if (occurrences.length <= 1) {
          continue;
        }

        duplicateCount += occurrences.length - 1;
        let keep = occurrences[0];
        let keepScore = -Infinity;
        for (const occurrence of occurrences) {
          const zone = occurrence.zone;
          const localDistance = getRecordDistanceToZone(occurrence.record, zone);
          const underBonus = zone.orders < globalTarget ? 100000 : 0;
          const overPenalty = Math.max(0, zone.orders - maxTarget) * 100;
          const shortRouteBonus = Math.max(0, 800 - zone.maxStepMeters);
          const score = underBonus + shortRouteBonus - localDistance - overPenalty;
          if (score > keepScore) {
            keep = occurrence;
            keepScore = score;
          }
        }

        for (const zone of zones) {
          let keptInThisZone = false;
          zone.records = (zone.records || []).filter((record) => {
            if (!record || record.id !== recordId) {
              return true;
            }
            if (zone === keep.zone && !keptInThisZone) {
              keptInThisZone = true;
              return true;
            }
            return false;
          });
        }
      }

      zones.forEach(refreshZoneMetrics);

      const assignedIds = new Set();
      for (const zone of zones) {
        const uniqueRecords = [];
        for (const record of zone.records || []) {
          if (!record || assignedIds.has(record.id)) {
            continue;
          }
          assignedIds.add(record.id);
          uniqueRecords.push(record);
        }
        zone.records = uniqueRecords;
        refreshZoneMetrics(zone);
      }

      const missingRecords = (allRecords || []).filter((record) => record && record.id && !assignedIds.has(record.id));
      for (const record of missingRecords) {
        const receiver = zones
          .slice()
          .sort((a, b) => {
            const aDistance = getRecordDistanceToZone(record, a);
            const bDistance = getRecordDistanceToZone(record, b);
            const aBandPenalty = a.orders + record.orders > maxTarget ? 200000 : 0;
            const bBandPenalty = b.orders + record.orders > maxTarget ? 200000 : 0;
            const aUnderBonus = a.orders < minTarget ? -100000 : 0;
            const bUnderBonus = b.orders < minTarget ? -100000 : 0;
            return (aDistance + aBandPenalty + aUnderBonus + a.orders)
              - (bDistance + bBandPenalty + bUnderBonus + b.orders);
          })[0];
        if (receiver) {
          receiver.records.push(record);
          assignedIds.add(record.id);
          refreshZoneMetrics(receiver);
        }
      }

      if (duplicateCount || missingRecords.length) {
        console.warn("Assignment uniqueness repaired", {
          duplicateRecordsRemoved: duplicateCount,
          missingRecordsRestored: missingRecords.length
        });
      }

      zones.forEach(refreshZoneMetrics);
      return zones;
    }

    function getRecordsOrders(records) {
      return (records || []).reduce((sum, record) => sum + (record.orders || 0), 0);
    }

    function getMinDistanceBetweenRecordSets(leftRecords, rightRecords) {
      if (!leftRecords.length || !rightRecords.length) {
        return Infinity;
      }
      let best = Infinity;
      for (const left of leftRecords) {
        for (const right of rightRecords) {
          if (left.id === right.id) {
            continue;
          }
          best = Math.min(best, haversineM(left.lat, left.lon, right.lat, right.lon));
        }
      }
      return best;
    }

    function getRecordGroupDistanceToZone(groupRecords, zone) {
      if (!groupRecords.length || !zone.records || !zone.records.length) {
        return Infinity;
      }
      return getMinDistanceBetweenRecordSets(groupRecords, zone.records);
    }

    function getRouteMaxStep(records) {
      let maxStep = 0;
      for (let index = 1; index < records.length; index += 1) {
        const prev = records[index - 1];
        const current = records[index];
        maxStep = Math.max(maxStep, haversineM(prev.lat, prev.lon, current.lat, current.lon));
      }
      return maxStep;
    }

    function reorderRecordsForRoute(records, blockMap, globalTarget) {
      const tempZone = createZone(0, globalTarget, globalTarget * 0.9, globalTarget * 1.1);
      tempZone.records = records.slice();
      return reorderZoneRecordsByBlockRoute(tempZone, blockMap).records.slice();
    }

    function collectOutlierRouteGroups(zone, globalTarget) {
      const groups = [];
      if (!zone.records || zone.records.length < 2) {
        return groups;
      }

      for (let index = 1; index < zone.records.length; index += 1) {
        const prev = zone.records[index - 1];
        const current = zone.records[index];
        const step = haversineM(prev.lat, prev.lon, current.lat, current.lon);
        if (step < OUTLIER_RELOCATION_JUMP_METERS) {
          continue;
        }

        const left = zone.records.slice(0, index);
        const right = zone.records.slice(index);
        const leftOrders = getRecordsOrders(left);
        const rightOrders = getRecordsOrders(right);
        const smaller = leftOrders <= rightOrders
          ? { records: left, orders: leftOrders, side: "left" }
          : { records: right, orders: rightOrders, side: "right" };

        if (!smaller.records.length) {
          continue;
        }

        const share = smaller.orders / Math.max(1, globalTarget);
        if (share > OUTLIER_RELOCATION_MAX_SHARE && smaller.records.length > 3) {
          continue;
        }

        groups.push({
          zone,
          records: smaller.records,
          recordIds: new Set(smaller.records.map((record) => record.id)),
          orders: smaller.orders,
          sourceStep: step,
          side: smaller.side
        });
      }

      return groups.sort((a, b) => b.sourceStep - a.sourceStep || a.orders - b.orders);
    }

    function reduceOutlierRouteJumps(zones, blockMap, globalTarget) {
      if (!zones || zones.length <= 1) {
        return zones;
      }

      const minTarget = globalTarget * 0.9;
      const maxTarget = globalTarget * 1.1;

      for (let pass = 0; pass < 80; pass += 1) {
        zones = reorderZonesByBlockRoute(zones, blockMap);
        zones.forEach(refreshZoneMetrics);

        const candidates = zones
          .flatMap((zone) => collectOutlierRouteGroups(zone, globalTarget))
          .sort((a, b) => b.sourceStep - a.sourceStep || a.orders - b.orders);

        let bestMove = null;

        for (const candidate of candidates) {
          const donor = candidate.zone;
          const donorAfterOrders = donor.orders - candidate.orders;
          if (donorAfterOrders < minTarget) {
            continue;
          }

          const donorRemaining = donor.records.filter((record) => !candidate.recordIds.has(record.id));
          if (!donorRemaining.length) {
            continue;
          }

          const donorAfterMaxStep = getRouteMaxStep(reorderRecordsForRoute(donorRemaining, blockMap, globalTarget));

          for (const receiver of zones) {
            if (receiver.id === donor.id) {
              continue;
            }
            if (candidate.records.some((record) => receiver.addressIdsSet && receiver.addressIdsSet.has(record.id))) {
              continue;
            }

            const receiverAfterOrders = receiver.orders + candidate.orders;
            if (receiverAfterOrders > maxTarget) {
              continue;
            }

            const receiverDistance = getRecordGroupDistanceToZone(candidate.records, receiver);
            if (!Number.isFinite(receiverDistance)) {
              continue;
            }

            const improvement = candidate.sourceStep - receiverDistance;
            if (improvement < OUTLIER_RELOCATION_IMPROVEMENT_METERS) {
              continue;
            }

            const receiverAfterRecords = reorderRecordsForRoute(
              receiver.records.concat(candidate.records),
              blockMap,
              globalTarget
            );
            const receiverAfterMaxStep = getRouteMaxStep(receiverAfterRecords);
            const beforeWorstJump = Math.max(donor.maxStepMeters || 0, receiver.maxStepMeters || 0);
            const afterWorstJump = Math.max(donorAfterMaxStep, receiverAfterMaxStep);
            if (afterWorstJump >= beforeWorstJump && improvement < 900) {
              continue;
            }

            const balancePenalty =
              Math.abs(donorAfterOrders - globalTarget) * 2 +
              Math.abs(receiverAfterOrders - globalTarget) * 1.4;
            const jumpGain = beforeWorstJump - afterWorstJump;
            const score =
              improvement * 12 +
              jumpGain * 8 -
              receiverDistance * 0.8 -
              balancePenalty -
              Math.max(0, receiverAfterMaxStep - MAX_REGULAR_JUMP_METERS) * 20;

            if (!bestMove || score > bestMove.score) {
              bestMove = {
                donor,
                receiver,
                candidate,
                donorRemaining,
                receiverAfterRecords,
                score
              };
            }
          }
        }

        if (!bestMove) {
          break;
        }

        bestMove.donor.records = bestMove.donorRemaining;
        bestMove.receiver.records = bestMove.receiverAfterRecords;
        refreshZoneMetrics(bestMove.donor);
        refreshZoneMetrics(bestMove.receiver);
      }

      zones.forEach(refreshZoneMetrics);
      return zones;
    }

    function buildLocalRecordComponents(records, linkMeters) {
      const remaining = new Set(records.map((record) => record.id));
      const recordMap = new Map(records.map((record) => [record.id, record]));
      const components = [];

      while (remaining.size) {
        const firstId = remaining.values().next().value;
        const queue = [firstId];
        remaining.delete(firstId);
        const component = [];

        while (queue.length) {
          const currentId = queue.shift();
          const current = recordMap.get(currentId);
          if (!current) {
            continue;
          }
          component.push(current);

          for (const candidateId of Array.from(remaining)) {
            const candidate = recordMap.get(candidateId);
            if (!candidate) {
              remaining.delete(candidateId);
              continue;
            }
            if (haversineM(current.lat, current.lon, candidate.lat, candidate.lon) <= linkMeters) {
              remaining.delete(candidateId);
              queue.push(candidateId);
            }
          }
        }

        components.push({
          records: component,
          recordIds: new Set(component.map((record) => record.id)),
          orders: getRecordsOrders(component)
        });
      }

      return components.sort((a, b) => b.orders - a.orders || b.records.length - a.records.length);
    }

    function collectDetachedGroups(zone, globalTarget) {
      if (!zone.records || zone.records.length < 4) {
        return [];
      }

      const components = buildLocalRecordComponents(zone.records, DETACHED_GROUP_LINK_METERS);
      if (components.length <= 1) {
        return [];
      }

      const groups = [];
      const largestOrders = components[0].orders;
      for (const component of components.slice(1)) {
        const share = component.orders / Math.max(1, globalTarget);
        if (share > DETACHED_GROUP_MAX_SHARE && component.orders > largestOrders * 0.25) {
          continue;
        }

        const remainingRecords = zone.records.filter((record) => !component.recordIds.has(record.id));
        const ownDistance = getMinDistanceBetweenRecordSets(component.records, remainingRecords);
        if (!Number.isFinite(ownDistance) || ownDistance < DETACHED_GROUP_MIN_OWN_DISTANCE_METERS) {
          continue;
        }

        groups.push({
          zone,
          records: component.records,
          recordIds: component.recordIds,
          orders: component.orders,
          ownDistance
        });
      }

      return groups.sort((a, b) => b.ownDistance - a.ownDistance || a.orders - b.orders);
    }

    function reassignDetachedGroupsToNearestZones(zones, blockMap, globalTarget) {
      if (!zones || zones.length <= 1) {
        return zones;
      }

      const minTarget = globalTarget * 0.9;
      const maxTarget = globalTarget * 1.1;

      for (let pass = 0; pass < 80; pass += 1) {
        zones = reorderZonesByBlockRoute(zones, blockMap);
        zones.forEach(refreshZoneMetrics);

        const detachedGroups = zones
          .flatMap((zone) => collectDetachedGroups(zone, globalTarget))
          .sort((a, b) => b.ownDistance - a.ownDistance || a.orders - b.orders);

        let bestMove = null;

        for (const group of detachedGroups) {
          const donor = group.zone;
          const donorAfterOrders = donor.orders - group.orders;
          if (donorAfterOrders < minTarget) {
            continue;
          }

          const donorRemaining = donor.records.filter((record) => !group.recordIds.has(record.id));
          if (!donorRemaining.length) {
            continue;
          }

          for (const receiver of zones) {
            if (receiver.id === donor.id) {
              continue;
            }
            if (group.records.some((record) => receiver.addressIdsSet && receiver.addressIdsSet.has(record.id))) {
              continue;
            }

            const receiverAfterOrders = receiver.orders + group.orders;
            if (receiverAfterOrders > maxTarget) {
              continue;
            }

            const receiverDistance = getRecordGroupDistanceToZone(group.records, receiver);
            if (!Number.isFinite(receiverDistance)) {
              continue;
            }

            const improvement = group.ownDistance - receiverDistance;
            if (improvement < DETACHED_GROUP_MIN_IMPROVEMENT_METERS) {
              continue;
            }

            const receiverAfterRecords = reorderRecordsForRoute(
              receiver.records.concat(group.records),
              blockMap,
              globalTarget
            );
            const donorAfterRecords = reorderRecordsForRoute(donorRemaining, blockMap, globalTarget);
            const donorAfterMaxStep = getRouteMaxStep(donorAfterRecords);
            const receiverAfterMaxStep = getRouteMaxStep(receiverAfterRecords);
            const beforeWorstJump = Math.max(donor.maxStepMeters || 0, receiver.maxStepMeters || 0, group.ownDistance);
            const afterWorstJump = Math.max(donorAfterMaxStep, receiverAfterMaxStep);
            const balancePenalty =
              Math.abs(donorAfterOrders - globalTarget) * 2 +
              Math.abs(receiverAfterOrders - globalTarget) * 1.2;
            const score =
              improvement * 16 +
              (beforeWorstJump - afterWorstJump) * 7 -
              receiverDistance * 0.8 -
              balancePenalty;

            if (!bestMove || score > bestMove.score) {
              bestMove = {
                donor,
                receiver,
                donorAfterRecords,
                receiverAfterRecords,
                score
              };
            }
          }
        }

        if (!bestMove) {
          break;
        }

        bestMove.donor.records = bestMove.donorAfterRecords;
        bestMove.receiver.records = bestMove.receiverAfterRecords;
        refreshZoneMetrics(bestMove.donor);
        refreshZoneMetrics(bestMove.receiver);
      }

      zones.forEach(refreshZoneMetrics);
      return zones;
    }
